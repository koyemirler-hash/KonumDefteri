<!DOCTYPE html>
<html>
<head><title>İkon Yap</title></head>
<body>
<p>İkonları indirmek için sağ tık → Resmi farklı kaydet</p>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<a id="dl192" download="icon-192.png">192 indir</a> |
<a id="dl512" download="icon-512.png">512 indir</a>
<script>
function draw(id, size){
  const c=document.getElementById(id);
  const ctx=c.getContext("2d");
  ctx.fillStyle="#7c3aed";
  ctx.beginPath();
  ctx.roundRect(0,0,size,size,size*0.2);
  ctx.fill();
  ctx.font=size*0.55+"px serif";
  ctx.textAlign="center";
  ctx.textBaseline="middle";
  ctx.fillText("📍",size/2,size/2);
  return c.toDataURL();
}
document.getElementById("dl192").href=draw("c192",192);
document.getElementById("dl512").href=draw("c512",512);
</script>
</body>
</html>
