<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <meta name="theme-color" content="#7c3aed"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Konum Defteri"/>
  <meta name="description" content="Konumları kaydet, WhatsApp linklerini sakla"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <title>Konum Defteri</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{background:#0d0d12;color:#e8e8f0;font-family:'Segoe UI',system-ui,sans-serif;overflow-x:hidden}
    #root{max-width:430px;margin:0 auto;min-height:100vh}
    input,textarea,button{font-family:inherit}
    ::-webkit-scrollbar{display:none}
    .slide-in{animation:slideIn .22s ease}
    @keyframes slideIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    .fade{animation:fadeA .18s ease}
    @keyframes fadeA{from{opacity:0}to{opacity:1}}

    /* Install banner */
    #install-banner{display:none;position:fixed;bottom:80px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:398px;background:linear-gradient(135deg,#4f46e5,#7c3aed);border-radius:16px;padding:14px 16px;z-index:200;box-shadow:0 8px 32px #7c3aed44}
    #install-banner.show{display:flex;align-items:center;gap:12px}
  </style>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithRedirect, signInWithPopup, getRedirectResult, signOut, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy, setDoc }
      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const cfg = {
      apiKey: "AIzaSyD9XMN3bMbRb2CCUKaY8wbsUsLUfGCByGc",
      authDomain: "konumdefteri-c29e6.firebaseapp.com",
      databaseURL: "https://konumdefteri-c29e6-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "konumdefteri-c29e6",
      storageBucket: "konumdefteri-c29e6.firebasestorage.app",
      messagingSenderId: "1079347072591",
      appId: "1:1079347072591:web:8f4f7ce33c99f657c8243a"
    };
    const app = initializeApp(cfg);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();
    window._FB = { auth, db, provider, signInWithRedirect, signInWithPopup, getRedirectResult, signOut, onAuthStateChanged, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy, setDoc };
  </script>
</head>
<body>
<div id="root"></div>
<div id="install-banner">
  <span style="font-size:24px">📱</span>
  <div style="flex:1">
    <div style="font-weight:700;font-size:14px;color:#fff">Ana ekrana ekle</div>
    <div style="font-size:11px;color:rgba(255,255,255,.7)">Uygulama gibi kullanmak için yükle</div>
  </div>
  <button id="install-btn" style="background:rgba(255,255,255,.2);border:none;border-radius:10px;color:#fff;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer">Yükle</button>
  <button id="install-close" style="background:none;border:none;color:rgba(255,255,255,.6);font-size:18px;cursor:pointer;padding:4px">✕</button>
</div>

<script>
// ─── SABITLER ──────────────────────────────────────────────────────────────
const DEF_CATS = [
  {id:"ev",icon:"🏠",label:"Ev"},{id:"is",icon:"💼",label:"İş"},
  {id:"restoran",icon:"🍽️",label:"Restoran"},{id:"market",icon:"🛒",label:"Market"},
  {id:"hastane",icon:"🏥",label:"Hastane"},{id:"okul",icon:"🏫",label:"Okul"},
  {id:"diger",icon:"📍",label:"Diğer"}
];
const DEF_IDS = DEF_CATS.map(c=>c.id);
const EMOJIS = ["📍","🏠","💼","🍽️","🛒","🏥","🏫","⛽","🏖️","🏋️","🎭","🎓","🏦","🛕","⛪","🏪","🏨","🅿️","🚉","✈️","🌳","🎯","🔧","🎪","💈","🐾"];

const S = {
  bg:"#0d0d12",card:"#15151f",card2:"#1c1c2a",border:"#252535",
  purple:"#7c6df0",purpleL:"#9d8ff5",purpleDim:"rgba(124,109,240,.13)",
  green:"#22c55e",red:"#ef4444",text:"#e8e8f0",sub:"#6b7280",sub2:"#374151"
};

// ─── STATE ─────────────────────────────────────────────────────────────────
let state = {
  user: undefined, // undefined=loading, null=logged out
  locations: [], categories: [],
  screen: "list", selected: null,
  search: "", filterCat: "all",
  addStep: 1,
  form: {name:"",note:"",category:"diger",lat:"",lng:"",photo:"",pasteLink:""},
  locLoading: false,
  newCatLabel:"", newCatIcon:"📍",
  confirmDeleteCat: null,
  toast:"", toastType:"ok",
  toastTimer: null
};
let _unsubLoc=null, _unsubCat=null;

function setState(patch){ Object.assign(state,patch); render(); }

// ─── TOAST ─────────────────────────────────────────────────────────────────
function toast(msg,type="ok"){
  if(state.toastTimer) clearTimeout(state.toastTimer);
  const t = setTimeout(()=>setState({toast:""}), 2600);
  setState({toast:msg, toastType:type, toastTimer:t});
}

// ─── FIREBASE HELPERS ──────────────────────────────────────────────────────
function parseLink(text){
  const patterns=[
    /maps\.google\.com\/\?q=([-\d.]+),([-\d.]+)/,
    /maps\.google\.com\/\?.*ll=([-\d.]+),([-\d.]+)/,
    /google\.com\/maps\?q=([-\d.]+),([-\d.]+)/,
    /google\.com\/maps\/place\/[^/]+\/@([-\d.]+),([-\d.]+)/,
    /@([-\d.]+),([-\d.]+)/,
    /[?&]q=([-\d.]+),([-\d.]+)/,
  ];
  for(const p of patterns){ const m=text.match(p); if(m) return {lat:+m[1],lng:+m[2]}; }
  return null;
}

function getCat(id){ return state.categories.find(c=>c.id===id)||{icon:"📍",label:id}; }

function startListeners(uid){
  const {db,collection,query,orderBy,onSnapshot,setDoc,doc} = window._FB;
  if(_unsubLoc) _unsubLoc();
  if(_unsubCat) _unsubCat();

  _unsubLoc = onSnapshot(query(collection(db,"users",uid,"locations"),orderBy("createdAt","desc")), snap=>{
    setState({locations: snap.docs.map(d=>({id:d.id,...d.data()}))});
  });
  _unsubCat = onSnapshot(query(collection(db,"users",uid,"categories"),orderBy("order","asc")), async snap=>{
    if(snap.empty){
      for(let i=0;i<DEF_CATS.length;i++)
        await setDoc(doc(db,"users",uid,"categories",DEF_CATS[i].id),{...DEF_CATS[i],order:i});
    } else {
      setState({categories: snap.docs.map(d=>({id:d.id,...d.data()}))});
    }
  });
}

// ─── AUTH ──────────────────────────────────────────────────────────────────
window.addEventListener("load", ()=>{
  const {auth,onAuthStateChanged,getRedirectResult} = window._FB;
  getRedirectResult(auth).catch(()=>{});
  onAuthStateChanged(auth, u=>{
    if(u){ startListeners(u.uid); setState({user:u}); }
    else { if(_unsubLoc)_unsubLoc(); if(_unsubCat)_unsubCat(); setState({user:null,locations:[],categories:[]}); }
  });
});

async function login(){
  const {auth,provider,signInWithPopup,signInWithRedirect} = window._FB;
  const isPWA = window.matchMedia("(display-mode: standalone)").matches;
  try {
    if(isPWA) await signInWithRedirect(auth,provider);
    else await signInWithPopup(auth,provider);
  } catch(e){ toast("Giriş hatası: "+e.code,"err"); }
}
async function logout(){ await window._FB.signOut(window._FB.auth); setState({screen:"list"}); }

// ─── KONUM ─────────────────────────────────────────────────────────────────
function getLoc(){
  if(!navigator.geolocation) return toast("Konum desteklenmiyor","err");
  setState({locLoading:true});
  navigator.geolocation.getCurrentPosition(
    p=>{ setState({locLoading:false, addStep:3, form:{...state.form,lat:p.coords.latitude,lng:p.coords.longitude}}); },
    ()=>{ setState({locLoading:false}); toast("Konum alınamadı","err"); }
  );
}

function pasteLink(val){
  const c = parseLink(val);
  const f = {...state.form, pasteLink:val};
  if(c){ f.lat=c.lat; f.lng=c.lng; toast("✅ Koordinatlar algılandı!"); }
  setState({form:f});
}

async function saveLoc(){
  const {db,collection,addDoc} = window._FB;
  const f = state.form;
  if(!f.name.trim()) return toast("İsim girin!","err");
  if(!f.lat||!f.lng) return toast("Önce konum seçin!","err");
  try {
    await addDoc(collection(db,"users",state.user.uid,"locations"),{
      name:f.name.trim(), note:f.note.trim(), category:f.category,
      lat:+f.lat, lng:+f.lng, photo:f.photo,
      createdAt:new Date(), date:new Date().toLocaleDateString("tr-TR")
    });
    setState({form:{name:"",note:"",category:"diger",lat:"",lng:"",photo:"",pasteLink:""},addStep:1,screen:"list"});
    toast("📍 Konum kaydedildi!");
  } catch(e){ toast("Hata: "+e.message,"err"); }
}

async function deleteLoc(id){
  const {db,doc,deleteDoc} = window._FB;
  await deleteDoc(doc(db,"users",state.user.uid,"locations",id));
  setState({screen:"list"}); toast("🗑️ Silindi");
}

// ─── KATEGORİ ──────────────────────────────────────────────────────────────
async function addCat(){
  const {db,doc,setDoc} = window._FB;
  if(!state.newCatLabel.trim()) return toast("İsim girin!","err");
  const id = Date.now().toString();
  await setDoc(doc(db,"users",state.user.uid,"categories",id),{
    id, icon:state.newCatIcon, label:state.newCatLabel.trim(), order:state.categories.length
  });
  setState({newCatLabel:"",newCatIcon:"📍"}); toast("✅ Kategori eklendi!");
}

async function deleteCat(id){
  const {db,doc,deleteDoc} = window._FB;
  if(DEF_IDS.includes(id)) return toast("Varsayılan silinemez","err");
  await deleteDoc(doc(db,"users",state.user.uid,"categories",id));
  setState({confirmDeleteCat:null}); toast("🗑️ Kategori silindi");
}

// ─── FOTOĞRAF ──────────────────────────────────────────────────────────────
function handlePhoto(e){
  const file=e.target.files[0]; if(!file) return;
  if(file.size>600000) return toast("Max 600KB olmalı","err");
  const r=new FileReader();
  r.onload=()=>setState({form:{...state.form,photo:r.result}});
  r.readAsDataURL(file);
}

// ─── RENDER HELPERS ────────────────────────────────────────────────────────
function el(tag, attrs={}, ...children){
  const e = document.createElement(tag);
  for(const [k,v] of Object.entries(attrs)){
    if(k==="style" && typeof v==="object") Object.assign(e.style,v);
    else if(k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="class") e.className=v;
    else if(k==="html") e.innerHTML=v;
    else e.setAttribute(k,v);
  }
  children.flat().forEach(c=>{ if(c===null||c===undefined) return; e.appendChild(typeof c==="string"?document.createTextNode(c):c); });
  return e;
}

function btn(text, onClick, style={}, disabled=false){
  const b = el("button",{onclick:onClick,style:{border:"none",borderRadius:"14px",padding:"13px",fontSize:"14px",fontWeight:"700",cursor:disabled?"not-allowed":"pointer",opacity:disabled?.6:1,width:"100%",...style}},text);
  b.disabled=disabled; return b;
}

function input$(placeholder, value, onInput, style={}){
  const i = el("input",{placeholder,value,oninput:onInput,style:{width:"100%",background:S.card2,border:`1px solid ${S.border}`,borderRadius:"12px",color:S.text,padding:"11px 14px",fontSize:"14px",outline:"none",...style}});
  return i;
}

function label$(text){ return el("div",{style:{fontSize:"11px",color:S.purple,letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:"7px",fontWeight:"600"}},text); }

// ─── SCREENS ───────────────────────────────────────────────────────────────
function renderLogin(){
  return el("div",{style:{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"30px"}},
    el("div",{style:{fontSize:"64px",animation:"fadeA .5s ease"}},"📍"),
    el("div",{style:{fontSize:"26px",fontWeight:"800",color:S.text,marginTop:"12px"}},"Konum Defteri"),
    el("div",{style:{color:S.sub,fontSize:"13px",marginTop:"8px",textAlign:"center",lineHeight:"1.7"}},"Konumlarını kaydet, WhatsApp'tan gelen\nlinkleri sakla, yol tarifi al"),
    el("div",{style:{marginTop:"40px",width:"100%",maxWidth:"320px"}},
      btn("  Google ile Giriş Yap", login, {background:"#fff",color:"#1f1f1f",border:"1px solid #ddd",display:"flex",alignItems:"center",justifyContent:"center",gap:"10px",fontSize:"15px"})
    ),
    el("div",{style:{marginTop:"20px",color:S.sub2,fontSize:"11px",textAlign:"center"}},"Verileriniz Firebase'de güvenle saklanır")
  );
}

function renderHeader(){
  const titles = {list:"📍 Konumlarım", cats:"Kategoriler", detail:state.selected?.name||"", add:["Konum Ekle","Link Yapıştır","Detaylar"][state.addStep-1]};
  const wrap = el("div",{style:{background:"linear-gradient(135deg,#4f46e5,#7c3aed)",padding:"18px 18px 20px",position:"sticky",top:"0",zIndex:"100"}});
  const row = el("div",{style:{display:"flex",alignItems:"center",gap:"10px"}});

  if(state.screen!=="list"){
    const back = el("button",{onclick:()=>{ if(state.screen==="add"&&state.addStep>1) setState({addStep:state.addStep-1}); else setState({screen:"list",addStep:1}); }, style:{background:"rgba(255,255,255,.15)",border:"none",borderRadius:"50%",width:"34px",height:"34px",color:"#fff",fontSize:"16px",cursor:"pointer",flexShrink:"0"}}, "←");
    row.appendChild(back);
  }

  const titleWrap = el("div",{style:{flex:"1",minWidth:"0"}},
    el("div",{style:{fontSize:"10px",opacity:".6",letterSpacing:"2px",textTransform:"uppercase"}},"Konum Defteri"),
    el("div",{style:{fontSize:"19px",fontWeight:"800",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},titles[state.screen]||"")
  );
  row.appendChild(titleWrap);

  if(state.screen==="list"){
    const catBtn = el("button",{onclick:()=>setState({screen:"cats"}),style:{background:"rgba(255,255,255,.15)",border:"none",borderRadius:"10px",padding:"6px 10px",color:"#fff",fontSize:"12px",cursor:"pointer",fontWeight:"600",flexShrink:"0"}},"🗂️");
    row.appendChild(catBtn);
    if(state.user?.photoURL){
      const ava = el("img",{src:state.user.photoURL,title:"Çıkış yap",onclick:logout,style:{width:"32px",height:"32px",borderRadius:"50%",cursor:"pointer",border:"2px solid rgba(255,255,255,.3)",flexShrink:"0"}});
      ava.onerror=()=>ava.style.display="none";
      row.appendChild(ava);
    }
  }
  wrap.appendChild(row);

  if(state.screen==="list"){
    const sb = el("div",{style:{marginTop:"12px",background:"rgba(255,255,255,.12)",borderRadius:"12px",padding:"8px 14px",display:"flex",alignItems:"center",gap:"8px"}},
      el("span",{style:{opacity:".6"}},"🔍"),
    );
    const si = el("input",{placeholder:"Konum ara...",value:state.search,oninput:e=>setState({search:e.target.value}),style:{background:"none",border:"none",outline:"none",color:"#fff",fontSize:"14px",flex:"1"}});
    sb.appendChild(si);
    if(state.search){ const x=el("button",{onclick:()=>setState({search:""}),style:{background:"none",border:"none",color:"rgba(255,255,255,.5)",cursor:"pointer",fontSize:"16px"}},"✕"); sb.appendChild(x); }
    wrap.appendChild(sb);
  }
  return wrap;
}

function renderList(){
  const wrap = el("div",{style:{padding:"14px 14px 100px"},class:"slide-in"});
  // Cat filters
  const filters = el("div",{style:{display:"flex",gap:"7px",overflowX:"auto",paddingBottom:"10px",marginBottom:"10px"}});
  [{id:"all",icon:"🌍",label:"Tümü"},...state.categories].forEach(cat=>{
    const active=state.filterCat===cat.id;
    const b=el("button",{onclick:()=>setState({filterCat:cat.id}),style:{background:active?S.purple:S.card,border:`1px solid ${active?S.purple:S.border}`,borderRadius:"20px",padding:"6px 13px",color:active?"#fff":S.sub,fontSize:"12px",cursor:"pointer",whiteSpace:"nowrap",fontWeight:active?"700":"400",flexShrink:"0"}},`${cat.icon} ${cat.label}`);
    filters.appendChild(b);
  });
  wrap.appendChild(filters);

  const filtered = state.locations.filter(l=>
    (state.filterCat==="all"||l.category===state.filterCat)&&
    (l.name?.toLowerCase().includes(state.search.toLowerCase())||l.note?.toLowerCase().includes(state.search.toLowerCase()))
  );

  wrap.appendChild(el("div",{style:{fontSize:"11px",color:S.sub,marginBottom:"10px"}},`${filtered.length} konum · ${state.user?.displayName||""}`));

  if(!filtered.length){
    wrap.appendChild(el("div",{style:{textAlign:"center",marginTop:"70px"}},
      el("div",{style:{fontSize:"52px"}},"🗺️"),
      el("div",{style:{marginTop:"12px",fontSize:"15px",color:S.sub}},"Henüz konum yok"),
      el("div",{style:{fontSize:"12px",marginTop:"4px",color:S.sub2}},"Aşağıdan yeni konum ekle")
    ));
  } else {
    const list=el("div",{style:{display:"flex",flexDirection:"column",gap:"10px"}});
    filtered.forEach(loc=>{
      const cat=getCat(loc.category);
      const card=el("div",{onclick:()=>setState({selected:loc,screen:"detail"}),style:{background:S.card,borderRadius:"16px",overflow:"hidden",cursor:"pointer",border:`1px solid ${S.border}`,display:"flex"}});
      if(loc.photo) card.appendChild(el("img",{src:loc.photo,style:{width:"72px",height:"84px",objectFit:"cover",flexShrink:"0"}}));
      else card.appendChild(el("div",{style:{width:"72px",height:"84px",background:`${S.purple}22`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"28px",flexShrink:"0"}},cat.icon));
      const info=el("div",{style:{padding:"11px 14px",flex:"1",minWidth:"0"}},
        el("div",{style:{fontWeight:"700",fontSize:"15px",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},loc.name),
      );
      if(loc.note) info.appendChild(el("div",{style:{fontSize:"12px",color:S.sub,marginTop:"2px",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},loc.note));
      const tags=el("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginTop:"7px"}},
        el("span",{style:{background:S.purpleDim,color:S.purpleL,fontSize:"10px",padding:"2px 9px",borderRadius:"10px"}},`${cat.icon} ${cat.label}`),
        el("span",{style:{fontSize:"10px",color:S.sub2}},loc.date||"")
      );
      info.appendChild(tags);
      card.appendChild(info);
      card.appendChild(el("div",{style:{display:"flex",alignItems:"center",paddingRight:"14px",color:S.sub2}},"›"));
      list.appendChild(card);
    });
    wrap.appendChild(list);
  }
  return wrap;
}

function renderAddStep1(){
  const wrap = el("div",{style:{padding:"18px"},class:"slide-in"});
  wrap.appendChild(el("div",{style:{color:S.sub,fontSize:"13px",marginBottom:"20px"}},"Konumu nasıl eklemek istersin?"));
  const opts=[
    {icon:"📡",title:state.locLoading?"Konum alınıyor...":"Mevcut Konumumu Kullan",sub:"GPS ile bulunduğun yeri al",action:getLoc,loading:state.locLoading},
    {icon:"🔗",title:"Link Yapıştır",sub:"WhatsApp veya Google Maps linki",action:()=>setState({addStep:2})}
  ];
  opts.forEach(o=>{
    const b=el("button",{onclick:o.action,disabled:o.loading,style:{background:S.card,border:`1px solid ${S.border}`,borderRadius:"16px",padding:"16px 18px",display:"flex",alignItems:"center",gap:"14px",cursor:"pointer",textAlign:"left",opacity:o.loading?.6:1,width:"100%",marginBottom:"12px"}},
      el("div",{style:{fontSize:"32px",flexShrink:"0"}},o.loading?"⏳":o.icon),
      el("div",{},el("div",{style:{color:S.text,fontWeight:"700",fontSize:"15px"}},o.title),el("div",{style:{color:S.sub,fontSize:"12px",marginTop:"3px"}},o.sub)),
      el("div",{style:{marginLeft:"auto",color:S.sub2,fontSize:"18px"}},"›")
    );
    wrap.appendChild(b);
  });
  return wrap;
}

function renderAddStep2(){
  const wrap=el("div",{style:{padding:"18px",display:"flex",flexDirection:"column",gap:"16px"},class:"slide-in"});
  wrap.appendChild(el("div",{style:{background:`${S.purple}15`,border:`1px solid ${S.purple}30`,borderRadius:"14px",padding:"12px 16px"}},
    el("div",{style:{fontSize:"13px",color:S.purpleL,fontWeight:"600",marginBottom:"4px"}},"💡 Nasıl kullanılır?"),
    el("div",{style:{fontSize:"12px",color:S.sub,lineHeight:"1.6"}},"WhatsApp'tan gelen konuma uzun bas → Linki kopyala → buraya yapıştır")
  ));
  const ta=el("textarea",{placeholder:"https://maps.google.com/?q=... veya WhatsApp linki...",rows:"4",oninput:e=>pasteLink(e.target.value),style:{width:"100%",background:S.card2,border:`1px solid ${state.form.lat?S.green:S.border}`,borderRadius:"12px",color:S.text,padding:"11px 14px",fontSize:"13px",resize:"none",outline:"none",lineHeight:"1.5"}});
  ta.value=state.form.pasteLink;
  wrap.appendChild(ta);
  if(state.form.lat) wrap.appendChild(el("div",{style:{fontSize:"12px",color:S.green}},`✅ ${parseFloat(state.form.lat).toFixed(5)}, ${parseFloat(state.form.lng).toFixed(5)}`));
  wrap.appendChild(btn("Devam Et →",()=>{ if(!state.form.lat) return toast("Geçerli link girin!","err"); setState({addStep:3}); },{background:`linear-gradient(135deg,${S.purple},${S.purpleL})`,color:"#fff"}));
  return wrap;
}

function renderAddStep3(){
  const wrap=el("div",{style:{padding:"18px",display:"flex",flexDirection:"column",gap:"16px",paddingBottom:"40px"},class:"slide-in"});
  // Konum satırı
  const coordRow=el("div",{style:{background:S.card2,borderRadius:"12px",padding:"10px 14px",display:"flex",alignItems:"center",gap:"10px"}},
    el("span",{style:{fontSize:"20px"}},"📍"),
    el("div",{},el("div",{style:{fontSize:"11px",color:S.sub}},"Seçilen konum"),el("div",{style:{fontSize:"12px",color:S.green,fontFamily:"monospace"}},`${parseFloat(state.form.lat).toFixed(5)}, ${parseFloat(state.form.lng).toFixed(5)}`)),
    el("button",{onclick:()=>setState({form:{...state.form,lat:"",lng:"",pasteLink:""},addStep:1}),style:{marginLeft:"auto",background:"none",border:"none",color:S.sub,cursor:"pointer",fontSize:"13px"}},"Değiştir")
  );
  wrap.appendChild(coordRow);

  // İsim
  wrap.appendChild(el("div",{},label$("İsim *"),input$("Konum adı...",state.form.name,e=>setState({form:{...state.form,name:e.target.value}}))));
  // Not
  wrap.appendChild(el("div",{},label$("Notlar"),input$("Açıklama, not...",state.form.note,e=>setState({form:{...state.form,note:e.target.value}}))));

  // Kategori
  const catWrap=el("div",{},label$("Kategori"));
  const catBtns=el("div",{style:{display:"flex",flexWrap:"wrap",gap:"8px"}});
  state.categories.forEach(cat=>{
    const active=state.form.category===cat.id;
    catBtns.appendChild(el("button",{onclick:()=>setState({form:{...state.form,category:cat.id}}),style:{background:active?S.purple:S.card2,border:`1px solid ${active?S.purple:S.border}`,borderRadius:"10px",padding:"7px 13px",color:active?"#fff":S.sub,fontSize:"13px",cursor:"pointer",fontWeight:active?"700":"400"}},`${cat.icon} ${cat.label}`));
  });
  catWrap.appendChild(catBtns);
  wrap.appendChild(catWrap);

  // Fotoğraf
  const fotoWrap=el("div",{},label$("Fotoğraf"));
  const fileInp=el("input",{type:"file",accept:"image/*",onchange:handlePhoto,style:{display:"none"}});
  fotoWrap.appendChild(fileInp);
  if(state.form.photo){
    const imgWrap=el("div",{style:{position:"relative"}});
    imgWrap.appendChild(el("img",{src:state.form.photo,style:{width:"100%",borderRadius:"12px",maxHeight:"170px",objectFit:"cover"}}));
    imgWrap.appendChild(el("button",{onclick:()=>setState({form:{...state.form,photo:""}}),style:{position:"absolute",top:"8px",right:"8px",background:S.red,border:"none",borderRadius:"50%",width:"28px",height:"28px",color:"#fff",cursor:"pointer",fontSize:"14px"}},"✕"));
    fotoWrap.appendChild(imgWrap);
  } else {
    fotoWrap.appendChild(el("button",{onclick:()=>fileInp.click(),style:{width:"100%",background:S.card2,border:`2px dashed ${S.border}`,borderRadius:"12px",color:S.sub,padding:"22px",fontSize:"14px",cursor:"pointer"}},"📷 Fotoğraf Ekle (opsiyonel)"));
  }
  wrap.appendChild(fotoWrap);
  wrap.appendChild(btn("💾 Kaydet",saveLoc,{background:`linear-gradient(135deg,${S.purple},${S.purpleL})`,color:"#fff"}));
  return wrap;
}

function renderDetail(){
  const loc=state.selected;
  const cat=getCat(loc.category);
  const wrap=el("div",{style:{paddingBottom:"40px"},class:"slide-in"});
  if(loc.photo) wrap.appendChild(el("img",{src:loc.photo,style:{width:"100%",height:"210px",objectFit:"cover"}}));
  else wrap.appendChild(el("div",{style:{height:"120px",background:`linear-gradient(135deg,${S.purple}33,${S.purpleL}22)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"52px"}},cat.icon));
  const body=el("div",{style:{padding:"18px 18px 0"}});
  const top=el("div",{style:{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:"10px"}},
    el("div",{},el("div",{style:{fontSize:"23px",fontWeight:"800"}},loc.name),el("span",{style:{background:S.purpleDim,color:S.purpleL,fontSize:"12px",padding:"3px 10px",borderRadius:"10px",marginTop:"6px",display:"inline-block"}},`${cat.icon} ${cat.label}`)),
    el("div",{style:{fontSize:"11px",color:S.sub,flexShrink:"0",paddingTop:"4px"}},loc.date||"")
  );
  body.appendChild(top);
  if(loc.note) body.appendChild(el("div",{style:{marginTop:"14px",background:S.card,borderRadius:"12px",padding:"14px",color:"#94a3b8",fontSize:"14px",lineHeight:"1.6",border:`1px solid ${S.border}`}},loc.note));
  body.appendChild(el("div",{style:{marginTop:"14px",background:S.card,borderRadius:"12px",padding:"12px 16px",border:`1px solid ${S.border}`}},
    el("div",{style:{fontSize:"10px",color:S.purple,letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:"6px",fontWeight:"600"}},"Koordinatlar"),
    el("div",{style:{fontSize:"13px",color:"#94a3b8",fontFamily:"monospace"}},`${loc.lat?.toFixed(6)}, ${loc.lng?.toFixed(6)}`)
  ));
  const btns=el("div",{style:{display:"flex",flexDirection:"column",gap:"10px",marginTop:"16px"}});
  btns.appendChild(btn("🧭 Google Maps'te Yol Tarifi Al",()=>window.open(`https://www.google.com/maps/dir/?api=1&destination=${loc.lat},${loc.lng}`,"_blank"),{background:"linear-gradient(135deg,#16a34a,#22c55e)",color:"#fff"}));
  btns.appendChild(btn("🔗 Konum Linkini Kopyala",()=>{ navigator.clipboard?.writeText(`https://maps.google.com/?q=${loc.lat},${loc.lng}`); toast("🔗 Kopyalandı!"); },{background:"transparent",border:`1px solid ${S.purple}`,color:S.purpleL}));
  btns.appendChild(btn("🗑️ Konumu Sil",()=>deleteLoc(loc.id),{background:S.card,border:`1px solid #ef444430`,color:S.red}));
  body.appendChild(btns);
  wrap.appendChild(body);
  return wrap;
}

function renderCats(){
  const wrap=el("div",{style:{padding:"18px",paddingBottom:"40px"},class:"slide-in"});
  // Add form
  const addCard=el("div",{style:{background:S.card,borderRadius:"16px",padding:"16px",border:`1px solid ${S.border}`,marginBottom:"20px"}},
    el("div",{style:{fontSize:"13px",fontWeight:"700",marginBottom:"12px",color:S.purpleL}},"➕ Yeni Kategori")
  );
  const emojiGrid=el("div",{style:{display:"flex",flexWrap:"wrap",gap:"6px",marginBottom:"12px"}});
  EMOJIS.forEach(e=>{
    emojiGrid.appendChild(el("button",{onclick:()=>setState({newCatIcon:e}),style:{background:state.newCatIcon===e?S.purple:S.card2,border:`1px solid ${state.newCatIcon===e?S.purple:S.border}`,borderRadius:"8px",width:"36px",height:"36px",fontSize:"18px",cursor:"pointer"}},e));
  });
  addCard.appendChild(emojiGrid);
  const row=el("div",{style:{display:"flex",gap:"10px"}});
  const ni=input$("Kategori adı...",state.newCatLabel,e=>setState({newCatLabel:e.target.value}),{flex:"1",borderRadius:"11px"});
  row.appendChild(ni);
  row.appendChild(el("button",{onclick:addCat,style:{background:S.purple,border:"none",borderRadius:"11px",color:"#fff",padding:"10px 16px",fontSize:"14px",fontWeight:"700",cursor:"pointer",flexShrink:"0"}},"Ekle"));
  addCard.appendChild(row);
  wrap.appendChild(addCard);

  wrap.appendChild(el("div",{style:{fontSize:"11px",color:S.sub,letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:"10px",fontWeight:"600"}},"Mevcut Kategoriler"));
  const list=el("div",{style:{display:"flex",flexDirection:"column",gap:"8px"}});
  state.categories.forEach(cat=>{
    const count=state.locations.filter(l=>l.category===cat.id).length;
    const isDef=DEF_IDS.includes(cat.id);
    const row=el("div",{style:{background:S.card,borderRadius:"14px",padding:"13px 16px",display:"flex",alignItems:"center",gap:"12px",border:`1px solid ${S.border}`}},
      el("span",{style:{fontSize:"24px"}},cat.icon),
      el("div",{style:{flex:"1"}},el("div",{style:{fontWeight:"600",fontSize:"14px"}},cat.label),el("div",{style:{fontSize:"11px",color:S.sub,marginTop:"2px"}},`${count} konum`))
    );
    if(isDef) row.appendChild(el("span",{style:{fontSize:"10px",color:S.sub2,background:S.card2,padding:"3px 8px",borderRadius:"8px"}},"Varsayılan"));
    else row.appendChild(el("button",{onclick:()=>setState({confirmDeleteCat:cat.id}),style:{background:"none",border:`1px solid #ef444430`,borderRadius:"10px",color:S.red,padding:"5px 12px",fontSize:"12px",cursor:"pointer"}},"Sil"));
    list.appendChild(row);
  });
  wrap.appendChild(list);
  return wrap;
}

// ─── MAIN RENDER ───────────────────────────────────────────────────────────
function render(){
  const root=document.getElementById("root");
  root.innerHTML="";

  // Toast
  if(state.toast){
    const t=el("div",{style:{position:"fixed",top:"18px",left:"50%",transform:"translateX(-50%)",background:state.toastType==="err"?"#3b0d0d":"#0d2b1a",color:state.toastType==="err"?"#fca5a5":"#86efac",padding:"10px 20px",borderRadius:"30px",zIndex:"9999",fontSize:"13px",fontWeight:"600",boxShadow:"0 4px 24px rgba(0,0,0,.5)",border:`1px solid ${state.toastType==="err"?"#ef444440":"#22c55e40"}`,whiteSpace:"nowrap",pointerEvents:"none"}},state.toast);
    root.appendChild(t);
  }

  // Confirm modal
  if(state.confirmDeleteCat){
    const ov=el("div",{style:{position:"fixed",inset:"0",background:"rgba(0,0,0,.7)",zIndex:"999",display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}},
      el("div",{style:{background:S.card,borderRadius:"20px",padding:"24px",width:"100%",maxWidth:"320px",border:`1px solid ${S.border}`}},
        el("div",{style:{fontSize:"17px",fontWeight:"700",marginBottom:"8px"}},"Kategoriyi Sil"),
        el("div",{style:{color:S.sub,fontSize:"13px",marginBottom:"20px"}},"Bu kategorideki konumlar 'Diğer' olarak kalır."),
        el("div",{style:{display:"flex",gap:"10px"}},
          btn("İptal",()=>setState({confirmDeleteCat:null}),{background:S.card2,border:`1px solid ${S.border}`,color:S.sub,flex:"1"}),
          btn("Sil",()=>deleteCat(state.confirmDeleteCat),{background:S.card,border:`1px solid #ef444430`,color:S.red,flex:"1"})
        )
      )
    );
    root.appendChild(ov);
  }

  if(state.user===undefined){ root.appendChild(el("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:S.sub,fontSize:"14px"}},"⏳ Yükleniyor...")); return; }
  if(!state.user){ root.appendChild(renderLogin()); return; }

  root.appendChild(renderHeader());
  if(state.screen==="list"){ root.appendChild(renderList()); }
  else if(state.screen==="add"){
    if(state.addStep===1) root.appendChild(renderAddStep1());
    else if(state.addStep===2) root.appendChild(renderAddStep2());
    else root.appendChild(renderAddStep3());
  }
  else if(state.screen==="detail") root.appendChild(renderDetail());
  else if(state.screen==="cats") root.appendChild(renderCats());

  // FAB
  if(state.screen==="list"){
    const fab=el("div",{style:{position:"fixed",bottom:"0",left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:"430px",padding:"12px 18px 28px",background:`linear-gradient(transparent,${S.bg} 40%)`,pointerEvents:"none"}},
      el("button",{onclick:()=>{ setState({screen:"add",addStep:1,form:{name:"",note:"",category:"diger",lat:"",lng:"",photo:"",pasteLink:""}}); },style:{width:"100%",background:"linear-gradient(135deg,#4f46e5,#7c3aed)",border:"none",borderRadius:"16px",color:"#fff",padding:"15px",fontSize:"15px",fontWeight:"800",cursor:"pointer",boxShadow:"0 6px 28px #7c6df055",pointerEvents:"all"}},"＋  Yeni Konum Ekle")
    );
    root.appendChild(fab);
  }
}

// ─── SERVICE WORKER & PWA ──────────────────────────────────────────────────
if("serviceWorker" in navigator){
  // Güncelleme gelince sayfayı yenile
  navigator.serviceWorker.addEventListener('controllerchange', () => window.location.reload());
  navigator.serviceWorker.register("/KonumDefteri/sw.js").catch(()=>{});
}

// Install prompt
let deferredPrompt;
window.addEventListener("beforeinstallprompt", e=>{
  e.preventDefault();
  deferredPrompt=e;
  document.getElementById("install-banner").classList.add("show");
});
document.getElementById("install-btn").onclick=async()=>{
  if(deferredPrompt){ deferredPrompt.prompt(); const r=await deferredPrompt.userChoice; deferredPrompt=null; document.getElementById("install-banner").classList.remove("show"); }
};
document.getElementById("install-close").onclick=()=>{ document.getElementById("install-banner").classList.remove("show"); };

render();
</script>
</body>
</html>
