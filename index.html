<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <meta name="theme-color" content="#7c3aed"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Konum Defteri"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <title>Konum Defteri</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{background:#0d0d12;color:#e8e8f0;font-family:'Segoe UI',system-ui,sans-serif;overflow-x:hidden}
    #root{max-width:430px;margin:0 auto;min-height:100vh;position:relative}
    input,textarea,button{font-family:inherit}
    ::-webkit-scrollbar{display:none}
    @keyframes slideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .slide-in{animation:slideIn .2s ease}
    .fade-in{animation:fadeIn .3s ease}

    /* Permission banner */
    #perm-banner{display:none;position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
      width:calc(100% - 28px);max-width:402px;background:#1c1c2a;border:1px solid #7c6df055;
      border-radius:16px;padding:14px 16px;z-index:300;box-shadow:0 8px 32px rgba(0,0,0,.5)}

    /* Install banner */
    #install-banner{display:none;position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
      width:calc(100% - 28px);max-width:402px;background:linear-gradient(135deg,#4f46e5,#7c3aed);
      border-radius:16px;padding:14px 16px;z-index:200;box-shadow:0 8px 32px #7c6df044}
    #install-banner.show{display:flex;align-items:center;gap:12px}

    textarea:focus,input:focus{border-color:#7c6df0 !important;outline:none}
  </style>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth,GoogleAuthProvider,signInWithPopup,signInWithRedirect,getRedirectResult,signOut,onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore,collection,addDoc,deleteDoc,doc,onSnapshot,query,orderBy,setDoc }
      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const app = initializeApp({
      apiKey:"AIzaSyD9XMN3bMbRb2CCUKaY8wbsUsLUfGCByGc",
      authDomain:"konumdefteri-c29e6.firebaseapp.com",
      projectId:"konumdefteri-c29e6",
      storageBucket:"konumdefteri-c29e6.firebasestorage.app",
      messagingSenderId:"1079347072591",
      appId:"1:1079347072591:web:8f4f7ce33c99f657c8243a"
    });
    const auth = getAuth(app);
    const db   = getFirestore(app);
    const prov = new GoogleAuthProvider();
    window._FB = {auth,db,prov,signInWithPopup,signInWithRedirect,getRedirectResult,signOut,onAuthStateChanged,collection,addDoc,deleteDoc,doc,onSnapshot,query,orderBy,setDoc};
  </script>
</head>
<body>
<div id="root"></div>

<!-- İzin banner -->
<div id="perm-banner">
  <div style="display:flex;align-items:flex-start;gap:12px">
    <span style="font-size:28px;flex-shrink:0">📍</span>
    <div style="flex:1">
      <div style="font-weight:700;font-size:14px;color:#e8e8f0;margin-bottom:4px">Konum İzni Gerekli</div>
      <div style="font-size:12px;color:#6b7280;line-height:1.5">GPS konumunu kullanmak için izin ver. Sadece sen kullandığında aktif olur.</div>
      <div style="display:flex;gap:8px;margin-top:10px">
        <button id="perm-allow" style="background:linear-gradient(135deg,#7c6df0,#9d8ff5);border:none;border-radius:10px;color:#fff;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer">İzin Ver</button>
        <button id="perm-deny" style="background:#1c1c2a;border:1px solid #252535;border-radius:10px;color:#6b7280;padding:8px 14px;font-size:13px;cursor:pointer">Kapat</button>
      </div>
    </div>
  </div>
</div>

<!-- Yükle banner -->
<div id="install-banner">
  <span style="font-size:24px">📱</span>
  <div style="flex:1">
    <div style="font-weight:700;font-size:14px;color:#fff">Ana ekrana ekle</div>
    <div style="font-size:11px;color:rgba(255,255,255,.7)">Uygulama gibi kullan</div>
  </div>
  <button id="install-btn" style="background:rgba(255,255,255,.2);border:none;border-radius:10px;color:#fff;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer">Yükle</button>
  <button id="install-close" style="background:none;border:none;color:rgba(255,255,255,.5);font-size:20px;cursor:pointer;padding:4px 6px">✕</button>
</div>

<script>
// ─── SABITLER ──────────────────────────────────────────────
const DEF_CATS = [
  {id:"ev",icon:"🏠",label:"Ev"},{id:"is",icon:"💼",label:"İş"},
  {id:"restoran",icon:"🍽️",label:"Restoran"},{id:"market",icon:"🛒",label:"Market"},
  {id:"hastane",icon:"🏥",label:"Hastane"},{id:"okul",icon:"🏫",label:"Okul"},
  {id:"diger",icon:"📍",label:"Diğer"}
];
const DEF_IDS = DEF_CATS.map(c=>c.id);
const EMOJIS = ["📍","🏠","💼","🍽️","🛒","🏥","🏫","⛽","🏖️","🏋️","🎭","🎓","🏦","🛕","⛪","🏪","🏨","🅿️","🚉","✈️","🌳","🎯","🔧","🎪","💈","🐾"];
const S = {
  bg:"#0d0d12",card:"#15151f",card2:"#1c1c2a",border:"#252535",
  purple:"#7c6df0",purpleL:"#9d8ff5",purpleDim:"rgba(124,109,240,.13)",
  green:"#22c55e",red:"#ef4444",text:"#e8e8f0",sub:"#6b7280",sub2:"#374151"
};

// ─── STATE ─────────────────────────────────────────────────
let S_ = {
  user:undefined, locations:[], categories:[],
  screen:"list", selected:null,
  search:"", filterCat:"all",
  addStep:1,
  form:{name:"",note:"",category:"diger",lat:"",lng:"",photo:"",pasteLink:""},
  locLoading:false,
  newCatLabel:"", newCatIcon:"📍",
  confirmDeleteCat:null,
  toast:"", toastType:"ok", toastTimer:null,
  permAsked: localStorage.getItem("perm-asked")==="1"
};
let _uLoc=null,_uCat=null;
function set(p){Object.assign(S_,p);render();}

// ─── TOAST ─────────────────────────────────────────────────
function toast(msg,type="ok"){
  if(S_.toastTimer) clearTimeout(S_.toastTimer);
  const t=setTimeout(()=>set({toast:""}),2700);
  set({toast:msg,toastType:type,toastTimer:t});
}

// ─── PARSE LİNK ────────────────────────────────────────────
function parseLink(text){
  if(!text) return null;
  const pats=[
    /maps\.google\.com\/\?q=([-\d.]+),([-\d.]+)/,
    /google\.com\/maps\/place\/[^@]+@([-\d.]+),([-\d.]+)/,
    /google\.com\/maps\?q=([-\d.]+),([-\d.]+)/,
    /@([-\d.]+),([-\d.]+)/,
    /[?&]q=([-\d.]+),([-\d.]+)/,
    /([-\d]{1,3}\.\d+),([-\d]{1,3}\.\d+)/,
  ];
  for(const p of pats){const m=text.match(p);if(m)return{lat:+m[1],lng:+m[2]};}
  return null;
}

function getCat(id){return S_.categories.find(c=>c.id===id)||{icon:"📍",label:id};}

// ─── FİREBASE DİNLEYİCİLERİ ───────────────────────────────
function startListeners(uid){
  const {db,collection,query,orderBy,onSnapshot,setDoc,doc}=window._FB;
  if(_uLoc)_uLoc(); if(_uCat)_uCat();
  _uLoc=onSnapshot(query(collection(db,"users",uid,"locations"),orderBy("createdAt","desc")),snap=>{
    set({locations:snap.docs.map(d=>({id:d.id,...d.data()}))});
  });
  _uCat=onSnapshot(query(collection(db,"users",uid,"categories"),orderBy("order","asc")),async snap=>{
    if(snap.empty){
      for(let i=0;i<DEF_CATS.length;i++)
        await setDoc(doc(db,"users",uid,"categories",DEF_CATS[i].id),{...DEF_CATS[i],order:i});
    } else {
      set({categories:snap.docs.map(d=>({id:d.id,...d.data()}))});
    }
  });
}

// ─── AUTH ──────────────────────────────────────────────────
window.addEventListener("load",()=>{
  const {auth,onAuthStateChanged,getRedirectResult}=window._FB;
  getRedirectResult(auth).catch(()=>{});
  onAuthStateChanged(auth,u=>{
    if(u){startListeners(u.uid);set({user:u});}
    else{if(_uLoc)_uLoc();if(_uCat)_uCat();set({user:null,locations:[],categories:[]});}
  });

  // İlk açılışta izin sor
  if(!localStorage.getItem("perm-asked")){
    setTimeout(()=>{
      document.getElementById("perm-banner").style.display="block";
    },2000);
  }
});

async function login(){
  const {auth,prov,signInWithPopup,signInWithRedirect}=window._FB;
  try{
    const isPWA=window.matchMedia("(display-mode:standalone)").matches||window.navigator.standalone;
    if(isPWA) await signInWithRedirect(auth,prov);
    else await signInWithPopup(auth,prov);
  }catch(e){toast("Giriş hatası: "+e.code,"err");}
}
async function logout(){await window._FB.signOut(window._FB.auth);set({screen:"list"});}

// ─── KONUM İZNİ ───────────────────────────────────────────
document.getElementById("perm-allow").onclick=()=>{
  localStorage.setItem("perm-asked","1");
  document.getElementById("perm-banner").style.display="none";
  navigator.geolocation.getCurrentPosition(
    p=>toast("✅ Konum izni verildi!"),
    e=>{
      if(e.code===1) toast("⚠️ Konum izni reddedildi. Ayarlardan açabilirsin.","err");
      else toast("Konum alınamadı","err");
    }
  );
};
document.getElementById("perm-deny").onclick=()=>{
  localStorage.setItem("perm-asked","1");
  document.getElementById("perm-banner").style.display="none";
};

// ─── KONUM AL ─────────────────────────────────────────────
function getLoc(){
  if(!navigator.geolocation) return toast("Tarayıcın GPS'i desteklemiyor","err");
  set({locLoading:true});
  navigator.geolocation.getCurrentPosition(
    p=>{ set({locLoading:false,addStep:3,form:{...S_.form,lat:p.coords.latitude,lng:p.coords.longitude}}); },
    err=>{
      set({locLoading:false});
      if(err.code===1) toast("Konum izni verilmemiş! Tarayıcı ayarlarından izin ver.","err");
      else if(err.code===2) toast("GPS sinyali alınamadı, dışarı çık veya tekrar dene","err");
      else toast("Konum alınamadı: "+err.message,"err");
    },
    {enableHighAccuracy:true,timeout:15000,maximumAge:0}
  );
}

// ─── LİNK YAPIŞTIR ────────────────────────────────────────
function handleLinkInput(val){
  set({form:{...S_.form,pasteLink:val}});
  if(!val.trim()) return;
  const c=parseLink(val);
  if(c){
    set({form:{...S_.form,pasteLink:val,lat:c.lat,lng:c.lng}});
    toast("✅ Koordinatlar algılandı!");
  }
}

// Pano'dan yapıştır butonu
async function pasteFromClipboard(){
  try{
    const text=await navigator.clipboard.readText();
    if(text){ handleLinkInput(text); }
    else toast("Pano boş","err");
  }catch{
    toast("Pano izni gerekli veya metni kutuya yapıştır","err");
  }
}

// ─── KAYDET ───────────────────────────────────────────────
async function saveLoc(){
  const {db,collection,addDoc}=window._FB;
  const f=S_.form;
  if(!f.name.trim()) return toast("İsim girin!","err");
  if(!f.lat||!f.lng) return toast("Önce konum seçin!","err");
  try{
    await addDoc(collection(db,"users",S_.user.uid,"locations"),{
      name:f.name.trim(),note:f.note.trim(),category:f.category,
      lat:+f.lat,lng:+f.lng,photo:f.photo,
      createdAt:new Date(),date:new Date().toLocaleDateString("tr-TR")
    });
    set({form:{name:"",note:"",category:"diger",lat:"",lng:"",photo:"",pasteLink:""},addStep:1,screen:"list"});
    toast("📍 Konum kaydedildi!");
  }catch(e){toast("Kayıt hatası: "+e.message,"err");}
}

async function deleteLoc(id){
  const {db,doc,deleteDoc}=window._FB;
  await deleteDoc(doc(db,"users",S_.user.uid,"locations",id));
  set({screen:"list"});toast("🗑️ Silindi");
}

// ─── KATEGORİ ──────────────────────────────────────────────
async function addCat(){
  const {db,doc,setDoc}=window._FB;
  if(!S_.newCatLabel.trim()) return toast("İsim girin!","err");
  const id=Date.now().toString();
  await setDoc(doc(db,"users",S_.user.uid,"categories",id),{
    id,icon:S_.newCatIcon,label:S_.newCatLabel.trim(),order:S_.categories.length
  });
  set({newCatLabel:"",newCatIcon:"📍"});toast("✅ Kategori eklendi!");
}
async function deleteCat(id){
  const {db,doc,deleteDoc}=window._FB;
  if(DEF_IDS.includes(id)) return toast("Varsayılan silinemez","err");
  await deleteDoc(doc(db,"users",S_.user.uid,"categories",id));
  set({confirmDeleteCat:null});toast("🗑️ Silindi");
}

// ─── FOTOĞRAF ──────────────────────────────────────────────
function handlePhoto(e){
  const f=e.target.files[0];if(!f) return;
  if(f.size>700000) return toast("Max 700KB olmalı","err");
  const r=new FileReader();
  r.onload=()=>set({form:{...S_.form,photo:r.result}});
  r.readAsDataURL(f);
}

// ─── DOM YARDIMCILARI ──────────────────────────────────────
function el(tag,attrs={},...ch){
  const e=document.createElement(tag);
  for(const [k,v] of Object.entries(attrs)){
    if(k==="style"&&typeof v==="object") Object.assign(e.style,v);
    else if(k.startsWith("on")&&typeof v==="function") e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="class") e.className=v;
    else e.setAttribute(k,v);
  }
  ch.flat().forEach(c=>{if(c==null) return; e.appendChild(typeof c==="string"?document.createTextNode(c):c);});
  return e;
}
const lbl=t=>el("div",{style:{fontSize:"11px",color:S.purple,letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:"8px",fontWeight:"600"}},t);
function inp(ph,val,cb,st={}){
  const i=el("input",{placeholder:ph,value:val||"",style:{width:"100%",background:S.card2,border:`1px solid ${S.border}`,borderRadius:"12px",color:S.text,padding:"11px 14px",fontSize:"14px",outline:"none",...st}});
  i.addEventListener("input",e=>cb(e.target.value));
  return i;
}
function btn(txt,cb,st={}){
  return el("button",{onclick:cb,style:{border:"none",borderRadius:"14px",padding:"13px",fontSize:"14px",fontWeight:"700",cursor:"pointer",width:"100%",...st}},txt);
}

// ─── EKRANLAR ──────────────────────────────────────────────

function renderLogin(){
  return el("div",{class:"fade-in",style:{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"30px"}},
    el("div",{style:{fontSize:"72px",marginBottom:"4px"}},"📍"),
    el("div",{style:{fontSize:"28px",fontWeight:"800",color:S.text,marginTop:"8px"}},"Konum Defteri"),
    el("div",{style:{color:S.sub,fontSize:"13px",marginTop:"10px",textAlign:"center",lineHeight:"1.7",maxWidth:"260px"}},"Konumlarını kaydet, WhatsApp'tan gelen linkleri sakla, yol tarifi al"),
    el("div",{style:{marginTop:"44px",width:"100%",maxWidth:"320px"}},
      btn("  Google ile Giriş Yap",login,{background:"#fff",color:"#1f1f1f",border:"1px solid #ddd",display:"flex",alignItems:"center",justifyContent:"center",gap:"10px",fontSize:"15px"})
    ),
    el("div",{style:{marginTop:"16px",color:S.sub2,fontSize:"11px",textAlign:"center"}},"Verileriniz Firebase'de güvenle saklanır")
  );
}

function renderHeader(){
  const titles={list:"📍 Konumlarım",cats:"Kategoriler",detail:S_.selected?.name||"",add:["Konum Ekle","Link Yapıştır","Detaylar"][S_.addStep-1]};
  const wrap=el("div",{style:{background:"linear-gradient(135deg,#4f46e5,#7c3aed)",padding:"18px 18px 20px",position:"sticky",top:"0",zIndex:"100"}});
  const row=el("div",{style:{display:"flex",alignItems:"center",gap:"10px"}});
  if(S_.screen!=="list"){
    row.appendChild(el("button",{onclick:()=>{if(S_.screen==="add"&&S_.addStep>1)set({addStep:S_.addStep-1});else set({screen:"list",addStep:1});},style:{background:"rgba(255,255,255,.15)",border:"none",borderRadius:"50%",width:"36px",height:"36px",color:"#fff",fontSize:"18px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:"0"}},"←"));
  }
  row.appendChild(el("div",{style:{flex:"1",minWidth:"0"}},
    el("div",{style:{fontSize:"10px",opacity:".6",letterSpacing:"2px",textTransform:"uppercase"}},"Konum Defteri"),
    el("div",{style:{fontSize:"19px",fontWeight:"800",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},titles[S_.screen]||"")
  ));
  if(S_.screen==="list"){
    row.appendChild(el("button",{onclick:()=>set({screen:"cats"}),style:{background:"rgba(255,255,255,.15)",border:"none",borderRadius:"10px",padding:"6px 10px",color:"#fff",fontSize:"12px",cursor:"pointer",fontWeight:"600",flexShrink:"0"}},"🗂️"));
    if(S_.user?.photoURL){
      const av=el("img",{src:S_.user.photoURL,title:"Çıkış",onclick:logout,style:{width:"32px",height:"32px",borderRadius:"50%",cursor:"pointer",border:"2px solid rgba(255,255,255,.3)",flexShrink:"0"}});
      av.onerror=()=>av.style.display="none"; row.appendChild(av);
    }
  }
  wrap.appendChild(row);
  if(S_.screen==="list"){
    const sb=el("div",{style:{marginTop:"12px",background:"rgba(255,255,255,.12)",borderRadius:"12px",padding:"8px 14px",display:"flex",alignItems:"center",gap:"8px"}},el("span",{style:{opacity:".6"}},"🔍"));
    const si=el("input",{placeholder:"Konum ara...",value:S_.search,style:{background:"none",border:"none",outline:"none",color:"#fff",fontSize:"14px",flex:"1"}});
    si.addEventListener("input",e=>set({search:e.target.value}));
    sb.appendChild(si);
    if(S_.search) sb.appendChild(el("button",{onclick:()=>set({search:""}),style:{background:"none",border:"none",color:"rgba(255,255,255,.5)",cursor:"pointer",fontSize:"18px"}},"✕"));
    wrap.appendChild(sb);
  }
  return wrap;
}

function renderList(){
  const wrap=el("div",{class:"slide-in",style:{padding:"14px 14px 100px"}});
  const filRow=el("div",{style:{display:"flex",gap:"7px",overflowX:"auto",paddingBottom:"10px",marginBottom:"10px"}});
  [{id:"all",icon:"🌍",label:"Tümü"},...S_.categories].forEach(c=>{
    const a=S_.filterCat===c.id;
    filRow.appendChild(el("button",{onclick:()=>set({filterCat:c.id}),style:{background:a?S.purple:S.card,border:`1px solid ${a?S.purple:S.border}`,borderRadius:"20px",padding:"6px 13px",color:a?"#fff":S.sub,fontSize:"12px",cursor:"pointer",whiteSpace:"nowrap",fontWeight:a?"700":"400",flexShrink:"0"}},`${c.icon} ${c.label}`));
  });
  wrap.appendChild(filRow);
  const filtered=S_.locations.filter(l=>(S_.filterCat==="all"||l.category===S_.filterCat)&&(l.name?.toLowerCase().includes(S_.search.toLowerCase())||l.note?.toLowerCase().includes(S_.search.toLowerCase())));
  wrap.appendChild(el("div",{style:{fontSize:"11px",color:S.sub,marginBottom:"10px"}},`${filtered.length} konum`));
  if(!filtered.length){
    wrap.appendChild(el("div",{style:{textAlign:"center",marginTop:"70px"}},el("div",{style:{fontSize:"52px"}},"🗺️"),el("div",{style:{marginTop:"12px",fontSize:"15px",color:S.sub}},"Henüz konum yok"),el("div",{style:{fontSize:"12px",marginTop:"4px",color:S.sub2}},"Aşağıdan yeni konum ekle")));
  } else {
    const list=el("div",{style:{display:"flex",flexDirection:"column",gap:"10px"}});
    filtered.forEach(loc=>{
      const cat=getCat(loc.category);
      const card=el("div",{onclick:()=>set({selected:loc,screen:"detail"}),style:{background:S.card,borderRadius:"16px",overflow:"hidden",cursor:"pointer",border:`1px solid ${S.border}`,display:"flex"}});
      if(loc.photo) card.appendChild(el("img",{src:loc.photo,style:{width:"72px",height:"84px",objectFit:"cover",flexShrink:"0"}}));
      else card.appendChild(el("div",{style:{width:"72px",height:"84px",background:`${S.purple}22`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"28px",flexShrink:"0"}},cat.icon));
      const info=el("div",{style:{padding:"11px 14px",flex:"1",minWidth:"0"}},el("div",{style:{fontWeight:"700",fontSize:"15px",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},loc.name));
      if(loc.note) info.appendChild(el("div",{style:{fontSize:"12px",color:S.sub,marginTop:"2px",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},loc.note));
      info.appendChild(el("div",{style:{display:"flex",gap:"8px",marginTop:"7px",alignItems:"center"}},el("span",{style:{background:S.purpleDim,color:S.purpleL,fontSize:"10px",padding:"2px 9px",borderRadius:"10px"}},`${cat.icon} ${cat.label}`),el("span",{style:{fontSize:"10px",color:S.sub2}},loc.date||"")));
      card.appendChild(info);
      card.appendChild(el("div",{style:{display:"flex",alignItems:"center",paddingRight:"14px",color:S.sub2}},"›"));
      list.appendChild(card);
    });
    wrap.appendChild(list);
  }
  return wrap;
}

function renderAddStep1(){
  const wrap=el("div",{class:"slide-in",style:{padding:"18px"}});
  wrap.appendChild(el("div",{style:{color:S.sub,fontSize:"13px",marginBottom:"20px"}},"Konumu nasıl eklemek istersin?"));
  [
    {icon:"📡",title:S_.locLoading?"Konum alınıyor...":"Mevcut Konumumu Kullan",sub:"GPS ile bulunduğun yeri al",action:getLoc,loading:S_.locLoading},
    {icon:"🔗",title:"Link Yapıştır",sub:"WhatsApp veya Google Maps linki",action:()=>set({addStep:2})}
  ].forEach(o=>{
    wrap.appendChild(el("button",{onclick:o.action,disabled:o.loading,style:{background:S.card,border:`1px solid ${S.border}`,borderRadius:"16px",padding:"16px 18px",display:"flex",alignItems:"center",gap:"14px",cursor:"pointer",textAlign:"left",width:"100%",marginBottom:"12px",opacity:o.loading?.6:1}},
      el("div",{style:{fontSize:"32px",flexShrink:"0"}},o.loading?"⏳":o.icon),
      el("div",{style:{flex:"1"}},el("div",{style:{color:S.text,fontWeight:"700",fontSize:"15px"}},o.title),el("div",{style:{color:S.sub,fontSize:"12px",marginTop:"3px"}},o.sub)),
      el("div",{style:{color:S.sub2,fontSize:"18px"}},"›")
    ));
  });
  return wrap;
}

function renderAddStep2(){
  const wrap=el("div",{class:"slide-in",style:{padding:"18px",display:"flex",flexDirection:"column",gap:"14px"}});
  wrap.appendChild(el("div",{style:{background:`${S.purple}15`,border:`1px solid ${S.purple}30`,borderRadius:"14px",padding:"12px 16px"}},
    el("div",{style:{fontSize:"13px",color:S.purpleL,fontWeight:"600",marginBottom:"4px"}},"💡 Nasıl kullanılır?"),
    el("div",{style:{fontSize:"12px",color:S.sub,lineHeight:"1.6"}},"WhatsApp'ta konuma uzun bas → Linki kopyala → aşağıya yapıştır")
  ));

  // Yapıştır butonu
  wrap.appendChild(btn("📋 Panodan Yapıştır",pasteFromClipboard,{background:S.card2,border:`1px solid ${S.border}`,color:S.purpleL,fontSize:"14px"}));

  wrap.appendChild(el("div",{style:{textAlign:"center",color:S.sub2,fontSize:"12px"}},"— veya aşağıya elle yapıştır —"));

  const taWrap=el("div",{});
  const ta=el("textarea",{placeholder:"https://maps.google.com/?q=...\nhttps://goo.gl/maps/...\nveya koordinat: 41.01234, 28.97890",rows:"4",style:{width:"100%",background:S.card2,border:`1px solid ${S_.form.lat?S.green:S.border}`,borderRadius:"12px",color:S.text,padding:"12px 14px",fontSize:"13px",resize:"none",outline:"none",lineHeight:"1.6"}});
  ta.value=S_.form.pasteLink||"";
  ta.addEventListener("input",e=>handleLinkInput(e.target.value));
  ta.addEventListener("paste",e=>{
    setTimeout(()=>handleLinkInput(e.target.value),50);
  });
  taWrap.appendChild(ta);
  if(S_.form.lat&&S_.form.lng){
    taWrap.appendChild(el("div",{style:{fontSize:"12px",color:S.green,marginTop:"6px",display:"flex",alignItems:"center",gap:"6px"}},`✅ ${parseFloat(S_.form.lat).toFixed(5)}, ${parseFloat(S_.form.lng).toFixed(5)}`));
  }
  wrap.appendChild(taWrap);
  wrap.appendChild(btn("Devam Et →",()=>{if(!S_.form.lat||!S_.form.lng)return toast("Geçerli bir link girin!","err");set({addStep:3});},{background:`linear-gradient(135deg,${S.purple},${S.purpleL})`,color:"#fff"}));
  return wrap;
}

function renderAddStep3(){
  const wrap=el("div",{class:"slide-in",style:{padding:"18px",display:"flex",flexDirection:"column",gap:"16px",paddingBottom:"40px"}});
  wrap.appendChild(el("div",{style:{background:S.card2,borderRadius:"12px",padding:"10px 14px",display:"flex",alignItems:"center",gap:"10px"}},
    el("span",{style:{fontSize:"22px"}},"📍"),
    el("div",{},el("div",{style:{fontSize:"11px",color:S.sub}},"Seçilen konum"),el("div",{style:{fontSize:"12px",color:S.green,fontFamily:"monospace"}},`${parseFloat(S_.form.lat).toFixed(5)}, ${parseFloat(S_.form.lng).toFixed(5)}`)),
    el("button",{onclick:()=>set({form:{...S_.form,lat:"",lng:"",pasteLink:""},addStep:1}),style:{marginLeft:"auto",background:"none",border:"none",color:S.sub,cursor:"pointer",fontSize:"13px"}},"Değiştir")
  ));
  wrap.appendChild(el("div",{},lbl("İsim *"),inp("Konum adı...",S_.form.name,v=>set({form:{...S_.form,name:v}}))));
  wrap.appendChild(el("div",{},lbl("Notlar"),inp("Açıklama, not...",S_.form.note,v=>set({form:{...S_.form,note:v}}))));

  const catW=el("div",{},lbl("Kategori"));
  const catG=el("div",{style:{display:"flex",flexWrap:"wrap",gap:"8px"}});
  S_.categories.forEach(c=>{
    const a=S_.form.category===c.id;
    catG.appendChild(el("button",{onclick:()=>set({form:{...S_.form,category:c.id}}),style:{background:a?S.purple:S.card2,border:`1px solid ${a?S.purple:S.border}`,borderRadius:"10px",padding:"7px 13px",color:a?"#fff":S.sub,fontSize:"13px",cursor:"pointer",fontWeight:a?"700":"400"}},`${c.icon} ${c.label}`));
  });
  catW.appendChild(catG); wrap.appendChild(catW);

  const fW=el("div",{},lbl("Fotoğraf"));
  const fi=el("input",{type:"file",accept:"image/*",style:{display:"none"}});
  fi.addEventListener("change",handlePhoto); fW.appendChild(fi);
  if(S_.form.photo){
    const iw=el("div",{style:{position:"relative"}});
    iw.appendChild(el("img",{src:S_.form.photo,style:{width:"100%",borderRadius:"12px",maxHeight:"170px",objectFit:"cover"}}));
    iw.appendChild(el("button",{onclick:()=>set({form:{...S_.form,photo:""}}),style:{position:"absolute",top:"8px",right:"8px",background:S.red,border:"none",borderRadius:"50%",width:"28px",height:"28px",color:"#fff",cursor:"pointer",fontSize:"14px"}},"✕"));
    fW.appendChild(iw);
  } else {
    fW.appendChild(el("button",{onclick:()=>fi.click(),style:{width:"100%",background:S.card2,border:`2px dashed ${S.border}`,borderRadius:"12px",color:S.sub,padding:"22px",fontSize:"14px",cursor:"pointer"}},"📷 Fotoğraf Ekle (opsiyonel)"));
  }
  wrap.appendChild(fW);
  wrap.appendChild(btn("💾 Kaydet",saveLoc,{background:`linear-gradient(135deg,${S.purple},${S.purpleL})`,color:"#fff"}));
  return wrap;
}

function renderDetail(){
  const loc=S_.selected; const cat=getCat(loc.category);
  const wrap=el("div",{class:"slide-in",style:{paddingBottom:"40px"}});
  if(loc.photo) wrap.appendChild(el("img",{src:loc.photo,style:{width:"100%",height:"210px",objectFit:"cover"}}));
  else wrap.appendChild(el("div",{style:{height:"120px",background:`linear-gradient(135deg,${S.purple}33,${S.purpleL}22)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"52px"}},cat.icon));
  const body=el("div",{style:{padding:"18px"}});
  body.appendChild(el("div",{style:{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:"10px"}},
    el("div",{},el("div",{style:{fontSize:"22px",fontWeight:"800"}},loc.name),el("span",{style:{background:S.purpleDim,color:S.purpleL,fontSize:"12px",padding:"3px 10px",borderRadius:"10px",marginTop:"6px",display:"inline-block"}},`${cat.icon} ${cat.label}`)),
    el("div",{style:{fontSize:"11px",color:S.sub,flexShrink:"0"}},loc.date||"")
  ));
  if(loc.note) body.appendChild(el("div",{style:{marginTop:"14px",background:S.card,borderRadius:"12px",padding:"14px",color:"#94a3b8",fontSize:"14px",lineHeight:"1.6",border:`1px solid ${S.border}`}},loc.note));
  body.appendChild(el("div",{style:{marginTop:"14px",background:S.card,borderRadius:"12px",padding:"12px 16px",border:`1px solid ${S.border}`}},
    lbl("Koordinatlar"),el("div",{style:{fontSize:"13px",color:"#94a3b8",fontFamily:"monospace"}},`${loc.lat?.toFixed(6)}, ${loc.lng?.toFixed(6)}`)
  ));
  const btns=el("div",{style:{display:"flex",flexDirection:"column",gap:"10px",marginTop:"16px"}});
  btns.appendChild(btn("🧭 Google Maps'te Yol Tarifi Al",()=>window.open(`https://www.google.com/maps/dir/?api=1&destination=${loc.lat},${loc.lng}`,"_blank"),{background:"linear-gradient(135deg,#16a34a,#22c55e)",color:"#fff"}));
  btns.appendChild(btn("🔗 Konum Linkini Kopyala",()=>{navigator.clipboard?.writeText(`https://maps.google.com/?q=${loc.lat},${loc.lng}`);toast("🔗 Kopyalandı!");},{background:"transparent",border:`1px solid ${S.purple}`,color:S.purpleL}));
  btns.appendChild(btn("🗑️ Konumu Sil",()=>deleteLoc(loc.id),{background:S.card,border:"1px solid #ef444430",color:S.red}));
  body.appendChild(btns); wrap.appendChild(body); return wrap;
}

function renderCats(){
  const wrap=el("div",{class:"slide-in",style:{padding:"18px",paddingBottom:"40px"}});
  const addCard=el("div",{style:{background:S.card,borderRadius:"16px",padding:"16px",border:`1px solid ${S.border}`,marginBottom:"20px"}},el("div",{style:{fontSize:"13px",fontWeight:"700",marginBottom:"12px",color:S.purpleL}},"➕ Yeni Kategori"));
  const eg=el("div",{style:{display:"flex",flexWrap:"wrap",gap:"6px",marginBottom:"12px"}});
  EMOJIS.forEach(e=>{eg.appendChild(el("button",{onclick:()=>set({newCatIcon:e}),style:{background:S_.newCatIcon===e?S.purple:S.card2,border:`1px solid ${S_.newCatIcon===e?S.purple:S.border}`,borderRadius:"8px",width:"36px",height:"36px",fontSize:"18px",cursor:"pointer"}},e));});
  addCard.appendChild(eg);
  const row=el("div",{style:{display:"flex",gap:"10px"}});
  const ni=inp("Kategori adı...",S_.newCatLabel,v=>set({newCatLabel:v}),{flex:"1",borderRadius:"11px"});
  row.appendChild(ni);
  row.appendChild(el("button",{onclick:addCat,style:{background:S.purple,border:"none",borderRadius:"11px",color:"#fff",padding:"10px 16px",fontSize:"14px",fontWeight:"700",cursor:"pointer",flexShrink:"0"}},"Ekle"));
  addCard.appendChild(row); wrap.appendChild(addCard);
  wrap.appendChild(el("div",{style:{fontSize:"11px",color:S.sub,letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:"10px",fontWeight:"600"}},"Mevcut Kategoriler"));
  const list=el("div",{style:{display:"flex",flexDirection:"column",gap:"8px"}});
  S_.categories.forEach(c=>{
    const cnt=S_.locations.filter(l=>l.category===c.id).length;
    const isDef=DEF_IDS.includes(c.id);
    const row2=el("div",{style:{background:S.card,borderRadius:"14px",padding:"13px 16px",display:"flex",alignItems:"center",gap:"12px",border:`1px solid ${S.border}`}},
      el("span",{style:{fontSize:"24px"}},c.icon),
      el("div",{style:{flex:"1"}},el("div",{style:{fontWeight:"600",fontSize:"14px"}},c.label),el("div",{style:{fontSize:"11px",color:S.sub,marginTop:"2px"}},`${cnt} konum`))
    );
    if(isDef) row2.appendChild(el("span",{style:{fontSize:"10px",color:S.sub2,background:S.card2,padding:"3px 8px",borderRadius:"8px"}},"Varsayılan"));
    else row2.appendChild(el("button",{onclick:()=>set({confirmDeleteCat:c.id}),style:{background:"none",border:"1px solid #ef444430",borderRadius:"10px",color:S.red,padding:"5px 12px",fontSize:"12px",cursor:"pointer"}},"Sil"));
    list.appendChild(row2);
  });
  wrap.appendChild(list); return wrap;
}

// ─── RENDER ────────────────────────────────────────────────
function render(){
  const root=document.getElementById("root");
  root.innerHTML="";

  if(S_.toast){
    root.appendChild(el("div",{style:{position:"fixed",top:"18px",left:"50%",transform:"translateX(-50%)",background:S_.toastType==="err"?"#3b0d0d":"#0d2b1a",color:S_.toastType==="err"?"#fca5a5":"#86efac",padding:"10px 20px",borderRadius:"30px",zIndex:"9999",fontSize:"13px",fontWeight:"600",boxShadow:"0 4px 24px rgba(0,0,0,.5)",border:`1px solid ${S_.toastType==="err"?"#ef444440":"#22c55e40"}`,whiteSpace:"nowrap",pointerEvents:"none",maxWidth:"90vw"}},S_.toast));
  }

  if(S_.confirmDeleteCat){
    root.appendChild(el("div",{style:{position:"fixed",inset:"0",background:"rgba(0,0,0,.75)",zIndex:"999",display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}},
      el("div",{style:{background:S.card,borderRadius:"20px",padding:"24px",width:"100%",maxWidth:"320px",border:`1px solid ${S.border}`}},
        el("div",{style:{fontSize:"17px",fontWeight:"700",marginBottom:"8px"}},"Kategoriyi Sil"),
        el("div",{style:{color:S.sub,fontSize:"13px",marginBottom:"20px"}},"Bu kategorideki konumlar 'Diğer' olarak kalır."),
        el("div",{style:{display:"flex",gap:"10px"}},
          btn("İptal",()=>set({confirmDeleteCat:null}),{background:S.card2,border:`1px solid ${S.border}`,color:S.sub,flex:"1"}),
          btn("Sil",()=>deleteCat(S_.confirmDeleteCat),{background:S.card,border:"1px solid #ef444430",color:S.red,flex:"1"})
        )
      )
    ));
  }

  if(S_.user===undefined){root.appendChild(el("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:S.sub,fontSize:"14px"}},"⏳ Yükleniyor..."));return;}
  if(!S_.user){root.appendChild(renderLogin());return;}

  root.appendChild(renderHeader());
  if(S_.screen==="list") root.appendChild(renderList());
  else if(S_.screen==="add"){
    if(S_.addStep===1) root.appendChild(renderAddStep1());
    else if(S_.addStep===2) root.appendChild(renderAddStep2());
    else root.appendChild(renderAddStep3());
  }
  else if(S_.screen==="detail") root.appendChild(renderDetail());
  else if(S_.screen==="cats") root.appendChild(renderCats());

  if(S_.screen==="list"){
    root.appendChild(el("div",{style:{position:"fixed",bottom:"0",left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:"430px",padding:"12px 18px 28px",background:`linear-gradient(transparent,${S.bg} 40%)`,pointerEvents:"none"}},
      el("button",{onclick:()=>set({screen:"add",addStep:1,form:{name:"",note:"",category:"diger",lat:"",lng:"",photo:"",pasteLink:""}}),style:{width:"100%",background:"linear-gradient(135deg,#4f46e5,#7c3aed)",border:"none",borderRadius:"16px",color:"#fff",padding:"15px",fontSize:"15px",fontWeight:"800",cursor:"pointer",boxShadow:"0 6px 28px #7c6df055",pointerEvents:"all"}},"＋  Yeni Konum Ekle")
    ));
  }
}

// ─── SW + INSTALL ──────────────────────────────────────────
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("/KonumDefteri/sw.js").catch(()=>{});
  navigator.serviceWorker.addEventListener("controllerchange",()=>window.location.reload());
}
let _deferredPrompt;
window.addEventListener("beforeinstallprompt",e=>{
  e.preventDefault(); _deferredPrompt=e;
  document.getElementById("install-banner").classList.add("show");
});
document.getElementById("install-btn").onclick=async()=>{
  if(_deferredPrompt){_deferredPrompt.prompt();await _deferredPrompt.userChoice;_deferredPrompt=null;document.getElementById("install-banner").classList.remove("show");}
};
document.getElementById("install-close").onclick=()=>document.getElementById("install-banner").classList.remove("show");

render();
</script>
</body>
</html>
