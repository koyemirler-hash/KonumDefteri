<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <meta name="theme-color" content="#7c3aed"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>

  <style>

    #root{max-width:430px;margin:0 auto;min-height:100dvh}

      from"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import{getFirestore,collection,addDoc,deleteDoc,doc,onSnapshot,query,orderBy,setDoc}
      from"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    const app=initializeApp({
      apiKey:"AIzaSyD9XMN3bMbRb2CCUKaY8wbsUsLUfGCByGc",
      authDomain:"konumdefteri-c29e6.firebaseapp.com",
      projectId:"konumdefteri-c29e6",
      storageBucket:"konumdefteri-c29e6.firebasestorage.app",
      messagingSenderId:"1079347072591",
      appId:"1:1079347072591:web:8f4f7ce33c99f657c8243a"
    });
    const auth=getAuth(app),db=getFirestore(app),prov=new GoogleAuthProvider();
    window._FB={auth,db,prov,signInWithPopup,signInWithRedirect,getRedirectResult,signOut,onAuthStateChanged,collection,addDoc,deleteDoc,doc,onSnapshot,query,orderBy,setDoc};
  </script>
</head>
<body>
<div id="root"></div>
<div id="install-banner">
  <span style="font-size:24px">📱</span>
  <div style="flex:1"><div style="font-weight:700;font-size:14px;color:#fff">Ana ekrana ekle</div><div style="font-size:11px;color:rgba(255,255,255,.7)">Uygulama gibi kullan</div></div>
  <button id="ib" style="background:rgba(255,255,255,.2);border:none;border-radius:10px;color:#fff;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer">Yükle</button>
  <button id="ic" style="background:none;border:none;color:rgba(255,255,255,.5);font-size:20px;cursor:pointer;padding:4px 6px">✕</button>
</div>
<script>
const DC=[
  {id:"ev",icon:"🏠",label:"Ev"},{id:"is",icon:"💼",label:"İş"},
  {id:"restoran",icon:"🍽️",label:"Restoran"},{id:"market",icon:"🛒",label:"Market"},
  {id:"hastane",icon:"🏥",label:"Hastane"},{id:"okul",icon:"🏫",label:"Okul"},
  {id:"diger",icon:"📍",label:"Diğer"}
];
const DI=DC.map(c=>c.id);
const EM=["📍","🏠","💼","🍽️","🛒","🏥","🏫","⛽","🏖️","🏋️","🎭","🎓","🏦","🛕","⛪","🏪","🏨","🅿️","🚉","✈️","🌳","🎯","🔧","🎪","💈","🐾"];
const C={bg:"#0d0d12",card:"#15151f",c2:"#1c1c2a",b:"#252535",p:"#7c6df0",pl:"#9d8ff5",pd:"rgba(124,109,240,.13)",g:"#22c55e",r:"#ef4444",t:"#e8e8f0",s:"#6b7280",s2:"#374151"};

// STATE
let $={user:undefined,locs:[],cats:[],screen:"list",sel:null,search:"",fcat:"all",step:1,method:"",
  form:{name:"",note:"",cat:"diger",lat:"",lng:"",photo:"",link:"",addr:"",manLat:"",manLng:""},
  addrResults:[],addrLoading:false,locLoading:false,
  newCL:"",newCI:"📍",confirmDel:null,toast:"",toastT:"ok",toastTm:null};
let uL=null,uC=null;
function set(p){Object.assign($,p);render();}

// TOAST
function toast(m,t="ok"){
  if($.toastTm)clearTimeout($.toastTm);
  const tm=setTimeout(()=>set({toast:""}),3000);
  set({toast:m,toastT:t,toastTm:tm});
}

// PARSE LINK - koordinat çıkar
function parseLink(txt){
  if(!txt)return null;
  const ps=[
    /(?:maps\.google\.com|google\.com\/maps).*?[@?&]q=([-\d.]+)[,+]([-\d.]+)/,
    /maps\.google\.com\/\?q=([-\d.]+),([-\d.]+)/,
    /google\.com\/maps\/place\/[^@]+@([-\d.]+),([-\d.]+)/,
    /@([-\d.]+),([-\d.]+)/,
    /[?&]q=([-\d.]+),([-\d.]+)/,
    /ll=([-\d.]+),([-\d.]+)/,
    /\b([-]?\d{1,3}\.\d{4,})[,\s]+([-]?\d{1,3}\.\d{4,})\b/,
  ];
  for(const p of ps){const m=txt.match(p);if(m){const la=+m[1],ln=+m[2];if(la>=-90&&la<=90&&ln>=-180&&ln<=180)return{lat:la,lng:ln};}}
  return null;
}

function getCat(id){return $.cats.find(c=>c.id===id)||{icon:"📍",label:id};}

// FİREBASE
function startFB(uid){
  const{db,collection,query,orderBy,onSnapshot,setDoc,doc}=window._FB;
  if(uL)uL();if(uC)uC();
  uL=onSnapshot(query(collection(db,"users",uid,"locations"),orderBy("createdAt","desc")),s=>{
    set({locs:s.docs.map(d=>({id:d.id,...d.data()}))});
  });
  uC=onSnapshot(query(collection(db,"users",uid,"categories"),orderBy("order","asc")),async s=>{
    if(s.empty){for(let i=0;i<DC.length;i++)await setDoc(doc(db,"users",uid,"categories",DC[i].id),{...DC[i],order:i});}
    else set({cats:s.docs.map(d=>({id:d.id,...d.data()}))});
  });
}

window.addEventListener("load",()=>{
  const{auth,onAuthStateChanged,getRedirectResult}=window._FB;
  getRedirectResult(auth).catch(()=>{});
  onAuthStateChanged(auth,u=>{
    if(u){startFB(u.uid);set({user:u});}
    else{if(uL)uL();if(uC)uC();set({user:null,locs:[],cats:[]});}
  });
});

async function login(){
  const{auth,prov,signInWithPopup,signInWithRedirect}=window._FB;
  try{
    const isPWA=window.matchMedia("(display-mode:standalone)").matches||window.navigator.standalone;
    if(isPWA)await signInWithRedirect(auth,prov);
    else await signInWithPopup(auth,prov);
  }catch(e){toast("Giriş hatası: "+e.code,"err");}
}
async function logout(){await window._FB.signOut(window._FB.auth);set({screen:"list"});}

// GPS KONUM
function getGPS(){
  if(!navigator.geolocation)return toast("Tarayıcın GPS desteklemiyor","err");
  set({locLoading:true});
  navigator.geolocation.getCurrentPosition(
    p=>{set({locLoading:false,form:{...$.form,lat:p.coords.latitude,lng:p.coords.longitude}});goStep3();},
    e=>{
      set({locLoading:false});
      const msgs={1:"❌ Konum izni reddedildi!\nTarayıcı adres çubuğundaki 🔒 kilit simgesine dokun → İzinler → Konum → İzin ver",2:"GPS sinyali yok. Dışarı çık veya WiFi'yi aç.",3:"Zaman aşımı. Tekrar dene."};
      toast(msgs[e.code]||"Konum alınamadı","err");
    },
    {enableHighAccuracy:true,timeout:12000,maximumAge:0}
  );
}

// ADRES ARAMA (OpenStreetMap Nominatim - ücretsiz)
async function searchAddr(q){
  if(!q.trim())return;
  set({addrLoading:true,addrResults:[]});
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=5&accept-language=tr`,{headers:{"Accept-Language":"tr"}});
    const d=await r.json();
    set({addrLoading:false,addrResults:d});
    if(!d.length)toast("Adres bulunamadı, farklı yaz","err");
  }catch{set({addrLoading:false});toast("Bağlantı hatası","err");}
}

function pickAddr(r){
  set({form:{...$.form,lat:+r.lat,lng:+r.lon,addr:r.display_name,name:$.form.name||r.display_name.split(",")[0]},addrResults:[]});
  goStep3();
}

// MANUEL KOORDİNAT
function applyManual(){
  const la=+$.form.manLat,ln=+$.form.manLng;
  if(isNaN(la)||isNaN(ln)||la<-90||la>90||ln<-180||ln>180)return toast("Geçersiz koordinat!","err");
  set({form:{...$.form,lat:la,lng:ln}});
  goStep3();
}

// LİNK YAPISTIR
function applyLink(){
  const c=parseLink($.form.link);
  if(c){set({form:{...$.form,lat:c.lat,lng:c.lng}});goStep3();}
  else toast("Koordinat bulunamadı.\nWhatsApp kısa link ise önce uzun linke çevir:\nmaps.google.com/?q=LAT,LNG formatında gönder","err");
}

function goStep3(){set({step:3});}

// KAYDET
async function saveLoc(){
  const{db,collection,addDoc}=window._FB;
  const f=$.form;
  if(!f.name.trim())return toast("İsim girin!","err");
  if(!f.lat||!f.lng)return toast("Konum seçilmedi!","err");
  try{
    await addDoc(collection(db,"users",$.user.uid,"locations"),{
      name:f.name.trim(),note:f.note.trim(),cat:f.cat,
      lat:+f.lat,lng:+f.lng,photo:f.photo,
      createdAt:new Date(),date:new Date().toLocaleDateString("tr-TR")
    });
    set({form:{name:"",note:"",cat:"diger",lat:"",lng:"",photo:"",link:"",addr:"",manLat:"",manLng:""},step:1,method:"",screen:"list"});
    toast("📍 Konum kaydedildi!");
  }catch(e){toast("Kayıt hatası: "+e.message,"err");}
}

async function delLoc(id){
  const{db,doc,deleteDoc}=window._FB;
  await deleteDoc(doc(db,"users",$.user.uid,"locations",id));
  set({screen:"list"});toast("🗑️ Silindi");
}

async function addCat(){
  const{db,doc,setDoc}=window._FB;
  if(!$.newCL.trim())return toast("İsim girin!","err");
  const id=Date.now().toString();
  await setDoc(doc(db,"users",$.user.uid,"categories",id),{id,icon:$.newCI,label:$.newCL.trim(),order:$.cats.length});
  set({newCL:"",newCI:"📍"});toast("✅ Eklendi!");
}
async function delCat(id){
  const{db,doc,deleteDoc}=window._FB;
  if(DI.includes(id))return toast("Varsayılan silinemez","err");
  await deleteDoc(doc(db,"users",$.user.uid,"categories",id));
  set({confirmDel:null});toast("🗑️ Silindi");
}

function handlePhoto(e){
  const f=e.target.files[0];if(!f)return;
  if(f.size>800000)return toast("Max 800KB","err");
  const r=new FileReader();r.onload=()=>set({form:{...$.form,photo:r.result}});r.readAsDataURL(f);
}

// DOM HELPERS
function el(tag,a={},...ch){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(a)){
    if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k.startsWith("on")&&typeof v==="function")e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="class")e.className=v;
    else e.setAttribute(k,v);
  }
  ch.flat().forEach(c=>{if(c==null)return;e.appendChild(typeof c==="string"?document.createTextNode(c):c);});
  return e;
}
const lbl=t=>el("div",{style:{fontSize:"11px",color:C.p,letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:"8px",fontWeight:"600"}},t);
function inp(ph,val,cb,st={}){
  const i=el("input",{placeholder:ph,value:val||"",style:{width:"100%",background:C.c2,border:`1px solid ${C.b}`,borderRadius:"12px",color:C.t,padding:"11px 14px",fontSize:"14px",...st}});
  i.addEventListener("input",e=>cb(e.target.value));
  return i;
}
function pbtn(txt,cb,st={}){return el("button",{onclick:cb,style:{border:"none",borderRadius:"14px",padding:"13px",fontSize:"14px",fontWeight:"700",cursor:"pointer",width:"100%",...st}},txt);}

// SCREENS
function renderLogin(){
  return el("div",{class:"up",style:{minHeight:"100dvh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"30px"}},
    el("div",{style:{fontSize:"72px"}},"📍"),
    el("div",{style:{fontSize:"28px",fontWeight:"800",marginTop:"8px"}},"Konum Defteri"),
    el("div",{style:{color:C.s,fontSize:"13px",marginTop:"10px",textAlign:"center",lineHeight:"1.7",maxWidth:"260px"}},"Konumlarını kaydet, WhatsApp linklerini sakla, yol tarifi al"),
    el("div",{style:{marginTop:"44px",width:"100%",maxWidth:"320px"}},
      pbtn("  Google ile Giriş Yap",login,{background:"#fff",color:"#1f1f1f",border:"1px solid #ddd",display:"flex",alignItems:"center",justifyContent:"center",gap:"10px",fontSize:"15px"})
    ),
    el("div",{style:{marginTop:"16px",color:C.s2,fontSize:"11px",textAlign:"center"}},"Firebase ile güvenli saklama")
  );
}

function renderHeader(){
  const ts={list:"📍 Konumlarım",cats:"Kategoriler",detail:$.sel?.name||"",add:$.step===1?"Konum Ekle":$.step===2?{gps:"GPS Konum",link:"Link Yapıştır",addr:"Adres Ara",manual:"Koordinat Gir"}[$.method]||"Konum Ekle":"Detaylar"};
  const w=el("div",{style:{background:"linear-gradient(135deg,#4f46e5,#7c3aed)",padding:"18px 18px 20px",position:"sticky",top:"0",zIndex:"100"}});
  const row=el("div",{style:{display:"flex",alignItems:"center",gap:"10px"}});
  if($.screen!=="list"){
    row.appendChild(el("button",{onclick:()=>{
      if($.screen==="add"){if($.step>1)set({step:$.step===2?1:$.step-1,addrResults:[]});else set({screen:"list",step:1,method:""});}
      else set({screen:"list"});
    },style:{background:"rgba(255,255,255,.15)",border:"none",borderRadius:"50%",width:"36px",height:"36px",color:"#fff",fontSize:"18px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:"0"}},"←"));
  }
  row.appendChild(el("div",{style:{flex:"1",minWidth:"0"}},
    el("div",{style:{fontSize:"10px",opacity:".6",letterSpacing:"2px",textTransform:"uppercase"}},"Konum Defteri"),
    el("div",{style:{fontSize:"19px",fontWeight:"800",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},ts[$.screen]||"")
  ));
  if($.screen==="list"){
    row.appendChild(el("button",{onclick:()=>set({screen:"cats"}),style:{background:"rgba(255,255,255,.15)",border:"none",borderRadius:"10px",padding:"6px 10px",color:"#fff",fontSize:"12px",cursor:"pointer",fontWeight:"600",flexShrink:"0"}},"🗂️"));
    if($.user?.photoURL){const av=el("img",{src:$.user.photoURL,onclick:logout,title:"Çıkış",style:{width:"32px",height:"32px",borderRadius:"50%",cursor:"pointer",border:"2px solid rgba(255,255,255,.3)",flexShrink:"0"}});av.onerror=()=>av.style.display="none";row.appendChild(av);}
  }
  w.appendChild(row);
  if($.screen==="list"){
    const sb=el("div",{style:{marginTop:"12px",background:"rgba(255,255,255,.12)",borderRadius:"12px",padding:"8px 14px",display:"flex",alignItems:"center",gap:"8px"}},el("span",{style:{opacity:".6"}},"🔍"));
    const si=el("input",{placeholder:"Konum ara...",value:$.search,style:{background:"none",border:"none",outline:"none",color:"#fff",fontSize:"14px",flex:"1"}});
    si.addEventListener("input",e=>set({search:e.target.value}));
    sb.appendChild(si);
    if($.search)sb.appendChild(el("button",{onclick:()=>set({search:""}),style:{background:"none",border:"none",color:"rgba(255,255,255,.5)",cursor:"pointer",fontSize:"18px"}},"✕"));
    w.appendChild(sb);
  }
  return w;
}

function renderList(){
  const wrap=el("div",{class:"up",style:{padding:"14px 14px 100px"}});
  const fr=el("div",{style:{display:"flex",gap:"7px",overflowX:"auto",paddingBottom:"10px",marginBottom:"10px"}});
  [{id:"all",icon:"🌍",label:"Tümü"},...$.cats].forEach(c=>{
    const a=$.fcat===c.id;
    fr.appendChild(el("button",{onclick:()=>set({fcat:c.id}),style:{background:a?C.p:C.card,border:`1px solid ${a?C.p:C.b}`,borderRadius:"20px",padding:"6px 13px",color:a?"#fff":C.s,fontSize:"12px",cursor:"pointer",whiteSpace:"nowrap",fontWeight:a?"700":"400",flexShrink:"0"}},`${c.icon} ${c.label}`));
  });
  wrap.appendChild(fr);
  const fl=$.locs.filter(l=>($.fcat==="all"||l.cat===$.fcat)&&(l.name?.toLowerCase().includes($.search.toLowerCase())||l.note?.toLowerCase().includes($.search.toLowerCase())));
  wrap.appendChild(el("div",{style:{fontSize:"11px",color:C.s,marginBottom:"10px"}},`${fl.length} konum`));
  if(!fl.length){
    wrap.appendChild(el("div",{style:{textAlign:"center",marginTop:"70px"}},el("div",{style:{fontSize:"52px"}},"🗺️"),el("div",{style:{marginTop:"12px",fontSize:"15px",color:C.s}},"Henüz konum yok"),el("div",{style:{fontSize:"12px",marginTop:"4px",color:C.s2}},"Aşağıdan yeni ekle")));
  }else{
    const list=el("div",{style:{display:"flex",flexDirection:"column",gap:"10px"}});
    fl.forEach(loc=>{
      const cat=getCat(loc.cat);
      const card=el("div",{onclick:()=>set({sel:loc,screen:"detail"}),style:{background:C.card,borderRadius:"16px",overflow:"hidden",cursor:"pointer",border:`1px solid ${C.b}`,display:"flex"}});
      if(loc.photo)card.appendChild(el("img",{src:loc.photo,style:{width:"72px",height:"84px",objectFit:"cover",flexShrink:"0"}}));
      else card.appendChild(el("div",{style:{width:"72px",height:"84px",background:`${C.p}22`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"28px",flexShrink:"0"}},cat.icon));
      const info=el("div",{style:{padding:"11px 14px",flex:"1",minWidth:"0"}},el("div",{style:{fontWeight:"700",fontSize:"15px",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},loc.name));
      if(loc.note)info.appendChild(el("div",{style:{fontSize:"12px",color:C.s,marginTop:"2px",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},loc.note));
      info.appendChild(el("div",{style:{display:"flex",gap:"8px",marginTop:"7px",alignItems:"center"}},el("span",{style:{background:C.pd,color:C.pl,fontSize:"10px",padding:"2px 9px",borderRadius:"10px"}},`${cat.icon} ${cat.label||cat.id}`),el("span",{style:{fontSize:"10px",color:C.s2}},loc.date||"")));
      card.appendChild(info);card.appendChild(el("div",{style:{display:"flex",alignItems:"center",paddingRight:"14px",color:C.s2}},"›"));
      list.appendChild(card);
    });
    wrap.appendChild(list);
  }
  return wrap;
}

// ADD STEP 1: Yöntem seç
function renderStep1(){
  const wrap=el("div",{class:"up",style:{padding:"18px"}});
  wrap.appendChild(el("div",{style:{color:C.s,fontSize:"13px",marginBottom:"20px"}},"Konumu nasıl eklemek istersin?"));
  const opts=[
    {icon:"📡",key:"gps",title:$.locLoading?"Alınıyor...":"Mevcut Konumumu Kullan",sub:"GPS ile anlık konum",action:()=>{set({method:"gps"});getGPS();},loading:$.locLoading},
    {icon:"🔍",key:"addr",title:"Adres ile Ara",sub:"Mahalle, sokak, şehir yazarak ara",action:()=>set({method:"addr",step:2})},
    {icon:"🔗",key:"link",title:"Google Maps Linki",sub:"Uzun link yapıştır (koordinat içerenleri)",action:()=>set({method:"link",step:2})},
    {icon:"🎯",key:"manual",title:"Koordinat Gir",sub:"Enlem/boylam biliyorsan elle gir",action:()=>set({method:"manual",step:2})},
  ];
  opts.forEach(o=>{
    wrap.appendChild(el("button",{onclick:o.action,disabled:o.loading,style:{background:C.card,border:`1px solid ${C.b}`,borderRadius:"16px",padding:"14px 16px",display:"flex",alignItems:"center",gap:"14px",cursor:"pointer",textAlign:"left",width:"100%",marginBottom:"10px",opacity:o.loading?.6:1}},
      el("div",{style:{fontSize:"28px",flexShrink:"0",width:"40px",textAlign:"center"}},o.loading?"⏳":o.icon),
      el("div",{style:{flex:"1"}},el("div",{style:{color:C.t,fontWeight:"700",fontSize:"15px"}},o.title),el("div",{style:{color:C.s,fontSize:"12px",marginTop:"3px"}},o.sub)),
      el("div",{style:{color:C.s2,fontSize:"18px"}},"›")
    ));
  });
  return wrap;
}

// ADD STEP 2: Seçilen yönteme göre
function renderStep2(){
  const wrap=el("div",{class:"up",style:{padding:"18px",display:"flex",flexDirection:"column",gap:"14px"}});

  if($.method==="addr"){
    wrap.appendChild(el("div",{style:{background:`${C.p}15`,border:`1px solid ${C.p}30`,borderRadius:"14px",padding:"12px 16px",fontSize:"12px",color:C.s,lineHeight:"1.6"}},"Mahalle, cadde, ilçe veya şehir adı yaz. Örn: Kadıköy, Bağdat Caddesi, Ankara"));
    const row=el("div",{style:{display:"flex",gap:"10px"}});
    const si=inp("Adres yaz...",$.form.addr,v=>set({form:{...$.form,addr:v}}));
    row.appendChild(si);
    row.appendChild(el("button",{onclick:()=>searchAddr($.form.addr),style:{background:C.p,border:"none",borderRadius:"12px",color:"#fff",padding:"11px 16px",fontSize:"20px",cursor:"pointer",flexShrink:"0"}},"🔍"));
    wrap.appendChild(row);
    if($.addrLoading) wrap.appendChild(el("div",{style:{textAlign:"center",color:C.s,padding:"20px"}},"⏳ Aranıyor..."));
    if($.addrResults.length){
      const list=el("div",{style:{display:"flex",flexDirection:"column",gap:"8px"}});
      $.addrResults.forEach(r=>{
        list.appendChild(el("button",{onclick:()=>pickAddr(r),style:{background:C.c2,border:`1px solid ${C.b}`,borderRadius:"12px",padding:"12px 14px",textAlign:"left",cursor:"pointer",width:"100%"}},
          el("div",{style:{fontWeight:"600",fontSize:"14px",color:C.t}},r.display_name.split(",")[0]),
          el("div",{style:{fontSize:"11px",color:C.s,marginTop:"3px",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},r.display_name)
        ));
      });
      wrap.appendChild(list);
    }
  }

  if($.method==="link"){
    wrap.appendChild(el("div",{style:{background:`${C.p}15`,border:`1px solid ${C.p}30`,borderRadius:"14px",padding:"12px 16px",fontSize:"12px",color:C.s,lineHeight:"1.6"}},"⚠️ WhatsApp kısa linkleri çalışmaz.\nKonum paylaşırken gelen uzun linki kopyala.\nYa da Google Maps'te konuma bas → Paylaş → Linki kopyala"));
    const ta=el("textarea",{placeholder:"https://maps.google.com/?q=41.01,28.97\nveya koordinat: 41.01234, 28.97890",rows:"4",style:{width:"100%",background:C.c2,border:`1px solid ${C.b}`,borderRadius:"12px",color:C.t,padding:"12px 14px",fontSize:"13px",resize:"none",lineHeight:"1.6"}});
    ta.value=$.form.link||"";
    ta.addEventListener("input",e=>{
      const v=e.target.value;
      set({form:{...$.form,link:v}});
      const c=parseLink(v);
      if(c)set({form:{...$.form,link:v,lat:c.lat,lng:c.lng}});
    });
    ta.addEventListener("paste",e=>setTimeout(()=>{
      const v=ta.value;
      const c=parseLink(v);
      if(c){set({form:{...$.form,link:v,lat:c.lat,lng:c.lng}});toast("✅ Koordinat algılandı!");}
    },100));
    wrap.appendChild(ta);
    if($.form.lat&&$.form.lng) wrap.appendChild(el("div",{style:{fontSize:"12px",color:C.g}},`✅ ${(+$.form.lat).toFixed(5)}, ${(+$.form.lng).toFixed(5)}`));
    wrap.appendChild(pbtn("Devam Et →",()=>{if(!$.form.lat||!$.form.lng)return toast("Geçerli koordinat bulunamadı","err");goStep3();},{background:`linear-gradient(135deg,${C.p},${C.pl})`,color:"#fff"}));
  }

  if($.method==="manual"){
    wrap.appendChild(el("div",{style:{background:`${C.p}15`,border:`1px solid ${C.p}30`,borderRadius:"14px",padding:"12px 16px",fontSize:"12px",color:C.s,lineHeight:"1.6"}},"Google Maps'te konuma uzun bas → kopyalanan metinden koordinatları gir.\nÖrn: Enlem: 41.0082  Boylam: 28.9784"));
    wrap.appendChild(el("div",{},lbl("Enlem (Latitude)"),inp("Örn: 41.0082376",$.form.manLat,v=>set({form:{...$.form,manLat:v}}),{type:"number",step:"0.000001"})));
    wrap.appendChild(el("div",{},lbl("Boylam (Longitude)"),inp("Örn: 28.9783589",$.form.manLng,v=>set({form:{...$.form,manLng:v}}),{type:"number",step:"0.000001"})));
    wrap.appendChild(pbtn("Konumu Onayla ✓",applyManual,{background:`linear-gradient(135deg,${C.p},${C.pl})`,color:"#fff"}));
    wrap.appendChild(el("div",{style:{textAlign:"center",color:C.s,fontSize:"12px",marginTop:"8px"}},"veya"));
    // Google Maps açıp oradan al
    wrap.appendChild(pbtn("🗺️ Google Maps'te Seç",()=>window.open("https://maps.google.com","_blank"),{background:C.c2,border:`1px solid ${C.b}`,color:C.pl,fontSize:"13px",padding:"10px"}));
  }

  return wrap;
}

// ADD STEP 3: Detaylar
function renderStep3(){
  const wrap=el("div",{class:"up",style:{padding:"18px",display:"flex",flexDirection:"column",gap:"16px",paddingBottom:"40px"}});
  wrap.appendChild(el("div",{style:{background:C.c2,borderRadius:"12px",padding:"10px 14px",display:"flex",alignItems:"center",gap:"10px"}},
    el("span",{style:{fontSize:"22px"}},"📍"),
    el("div",{},el("div",{style:{fontSize:"11px",color:C.s}},"Seçilen konum"),el("div",{style:{fontSize:"12px",color:C.g,fontFamily:"monospace"}},`${(+$.form.lat).toFixed(5)}, ${(+$.form.lng).toFixed(5)}`)),
    el("button",{onclick:()=>set({step:1,method:"",form:{...$.form,lat:"",lng:""}}),style:{marginLeft:"auto",background:"none",border:"none",color:C.s,cursor:"pointer",fontSize:"13px"}},"Değiştir")
  ));
  wrap.appendChild(el("div",{},lbl("İsim *"),inp("Konum adı...",$.form.name,v=>set({form:{...$.form,name:v}}))));
  wrap.appendChild(el("div",{},lbl("Notlar"),inp("Açıklama, not...",$.form.note,v=>set({form:{...$.form,note:v}}))));

  const cw=el("div",{},lbl("Kategori"));
  const cg=el("div",{style:{display:"flex",flexWrap:"wrap",gap:"8px"}});
  $.cats.forEach(c=>{
    const a=$.form.cat===c.id;
    cg.appendChild(el("button",{onclick:()=>set({form:{...$.form,cat:c.id}}),style:{background:a?C.p:C.c2,border:`1px solid ${a?C.p:C.b}`,borderRadius:"10px",padding:"7px 13px",color:a?"#fff":C.s,fontSize:"13px",cursor:"pointer",fontWeight:a?"700":"400"}},`${c.icon} ${c.label||c.id}`));
  });
  cw.appendChild(cg);wrap.appendChild(cw);

  const fw=el("div",{},lbl("Fotoğraf"));
  const fi=el("input",{type:"file",accept:"image/*",style:{display:"none"}});
  fi.addEventListener("change",handlePhoto);fw.appendChild(fi);
  if($.form.photo){
    const iw=el("div",{style:{position:"relative"}});
    iw.appendChild(el("img",{src:$.form.photo,style:{width:"100%",borderRadius:"12px",maxHeight:"170px",objectFit:"cover"}}));
    iw.appendChild(el("button",{onclick:()=>set({form:{...$.form,photo:""}}),style:{position:"absolute",top:"8px",right:"8px",background:C.r,border:"none",borderRadius:"50%",width:"28px",height:"28px",color:"#fff",cursor:"pointer",fontSize:"14px"}},"✕"));
    fw.appendChild(iw);
  }else{
    fw.appendChild(el("button",{onclick:()=>fi.click(),style:{width:"100%",background:C.c2,border:`2px dashed ${C.b}`,borderRadius:"12px",color:C.s,padding:"22px",fontSize:"14px",cursor:"pointer"}},"📷 Fotoğraf Ekle (opsiyonel)"));
  }
  wrap.appendChild(fw);
  wrap.appendChild(pbtn("💾 Kaydet",saveLoc,{background:`linear-gradient(135deg,${C.p},${C.pl})`,color:"#fff"}));
  return wrap;
}

function renderDetail(){
  const loc=$.sel;const cat=getCat(loc.cat);
  const wrap=el("div",{class:"up",style:{paddingBottom:"40px"}});
  if(loc.photo)wrap.appendChild(el("img",{src:loc.photo,style:{width:"100%",height:"210px",objectFit:"cover"}}));
  else wrap.appendChild(el("div",{style:{height:"120px",background:`linear-gradient(135deg,${C.p}33,${C.pl}22)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"52px"}},cat.icon));
  const body=el("div",{style:{padding:"18px"}});
  body.appendChild(el("div",{style:{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:"10px"}},
    el("div",{},el("div",{style:{fontSize:"22px",fontWeight:"800"}},loc.name),el("span",{style:{background:C.pd,color:C.pl,fontSize:"12px",padding:"3px 10px",borderRadius:"10px",marginTop:"6px",display:"inline-block"}},`${cat.icon} ${cat.label||cat.id}`)),
    el("div",{style:{fontSize:"11px",color:C.s,flexShrink:"0"}},loc.date||"")
  ));
  if(loc.note)body.appendChild(el("div",{style:{marginTop:"14px",background:C.card,borderRadius:"12px",padding:"14px",color:"#94a3b8",fontSize:"14px",lineHeight:"1.6",border:`1px solid ${C.b}`}},loc.note));
  body.appendChild(el("div",{style:{marginTop:"14px",background:C.card,borderRadius:"12px",padding:"12px 16px",border:`1px solid ${C.b}`}},lbl("Koordinatlar"),el("div",{style:{fontSize:"13px",color:"#94a3b8",fontFamily:"monospace"}},`${loc.lat?.toFixed(6)}, ${loc.lng?.toFixed(6)}`)));
  const bs=el("div",{style:{display:"flex",flexDirection:"column",gap:"10px",marginTop:"16px"}});
  bs.appendChild(pbtn("🧭 Google Maps'te Yol Tarifi Al",()=>window.open(`https://www.google.com/maps/dir/?api=1&destination=${loc.lat},${loc.lng}`,"_blank"),{background:"linear-gradient(135deg,#16a34a,#22c55e)",color:"#fff"}));
  bs.appendChild(pbtn("🔗 Konum Linkini Kopyala",()=>{navigator.clipboard?.writeText(`https://maps.google.com/?q=${loc.lat},${loc.lng}`);toast("🔗 Kopyalandı!");},{background:"transparent",border:`1px solid ${C.p}`,color:C.pl}));
  bs.appendChild(pbtn("🗑️ Sil",()=>delLoc(loc.id),{background:C.card,border:"1px solid #ef444430",color:C.r}));
  body.appendChild(bs);wrap.appendChild(body);return wrap;
}

function renderCats(){
  const wrap=el("div",{class:"up",style:{padding:"18px",paddingBottom:"40px"}});
  const ac=el("div",{style:{background:C.card,borderRadius:"16px",padding:"16px",border:`1px solid ${C.b}`,marginBottom:"20px"}},el("div",{style:{fontSize:"13px",fontWeight:"700",marginBottom:"12px",color:C.pl}},"➕ Yeni Kategori"));
  const eg=el("div",{style:{display:"flex",flexWrap:"wrap",gap:"6px",marginBottom:"12px"}});
  EM.forEach(e=>{eg.appendChild(el("button",{onclick:()=>set({newCI:e}),style:{background:$.newCI===e?C.p:C.c2,border:`1px solid ${$.newCI===e?C.p:C.b}`,borderRadius:"8px",width:"36px",height:"36px",fontSize:"18px",cursor:"pointer"}},e));});
  ac.appendChild(eg);
  const row=el("div",{style:{display:"flex",gap:"10px"}});
  const ni=inp("Kategori adı...",$.newCL,v=>set({newCL:v}),{flex:"1",borderRadius:"11px"});
  row.appendChild(ni);row.appendChild(el("button",{onclick:addCat,style:{background:C.p,border:"none",borderRadius:"11px",color:"#fff",padding:"10px 16px",fontSize:"14px",fontWeight:"700",cursor:"pointer",flexShrink:"0"}},"Ekle"));
  ac.appendChild(row);wrap.appendChild(ac);
  wrap.appendChild(el("div",{style:{fontSize:"11px",color:C.s,letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:"10px",fontWeight:"600"}},"Mevcut Kategoriler"));
  const list=el("div",{style:{display:"flex",flexDirection:"column",gap:"8px"}});
  $.cats.forEach(c=>{
    const cnt=$.locs.filter(l=>l.cat===c.id).length;const isDef=DI.includes(c.id);
    const r=el("div",{style:{background:C.card,borderRadius:"14px",padding:"13px 16px",display:"flex",alignItems:"center",gap:"12px",border:`1px solid ${C.b}`}},
      el("span",{style:{fontSize:"24px"}},c.icon),
      el("div",{style:{flex:"1"}},el("div",{style:{fontWeight:"600",fontSize:"14px"}},c.label||c.id),el("div",{style:{fontSize:"11px",color:C.s,marginTop:"2px"}},`${cnt} konum`))
    );
    if(isDef)r.appendChild(el("span",{style:{fontSize:"10px",color:C.s2,background:C.c2,padding:"3px 8px",borderRadius:"8px"}},"Varsayılan"));
    else r.appendChild(el("button",{onclick:()=>set({confirmDel:c.id}),style:{background:"none",border:"1px solid #ef444430",borderRadius:"10px",color:C.r,padding:"5px 12px",fontSize:"12px",cursor:"pointer"}},"Sil"));
    list.appendChild(r);
  });
  wrap.appendChild(list);return wrap;
}

// ANA RENDER
function render(){
  const root=document.getElementById("root");root.innerHTML="";
  if($.toast){root.appendChild(el("div",{style:{position:"fixed",top:"18px",left:"50%",transform:"translateX(-50%)",background:$.toastT==="err"?"#3b0d0d":"#0d2b1a",color:$.toastT==="err"?"#fca5a5":"#86efac",padding:"10px 20px",borderRadius:"30px",zIndex:"9999",fontSize:"13px",fontWeight:"600",boxShadow:"0 4px 24px rgba(0,0,0,.5)",border:`1px solid ${$.toastT==="err"?"#ef444440":"#22c55e40"}`,whiteSpace:"pre-wrap",pointerEvents:"none",maxWidth:"90vw",textAlign:"center"}},$.toast));}
  if($.confirmDel){
    root.appendChild(el("div",{style:{position:"fixed",inset:"0",background:"rgba(0,0,0,.75)",zIndex:"999",display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}},
      el("div",{style:{background:C.card,borderRadius:"20px",padding:"24px",width:"100%",maxWidth:"320px",border:`1px solid ${C.b}`}},
        el("div",{style:{fontSize:"17px",fontWeight:"700",marginBottom:"8px"}},"Kategoriyi Sil"),
        el("div",{style:{color:C.s,fontSize:"13px",marginBottom:"20px"}},"Bu kategorideki konumlar 'Diğer' olarak kalır."),
        el("div",{style:{display:"flex",gap:"10px"}},
          pbtn("İptal",()=>set({confirmDel:null}),{background:C.c2,border:`1px solid ${C.b}`,color:C.s,flex:"1"}),
          pbtn("Sil",()=>delCat($.confirmDel),{background:C.card,border:"1px solid #ef444430",color:C.r,flex:"1"})
        )
      )
    ));
  }
  if($.user===undefined){root.appendChild(el("div",{style:{minHeight:"100dvh",display:"flex",alignItems:"center",justifyContent:"center",color:C.s,fontSize:"14px"}},"⏳ Yükleniyor..."));return;}
  if(!$.user){root.appendChild(renderLogin());return;}
  root.appendChild(renderHeader());
  if($.screen==="list")root.appendChild(renderList());
  else if($.screen==="add"){if($.step===1)root.appendChild(renderStep1());else if($.step===2)root.appendChild(renderStep2());else root.appendChild(renderStep3());}
  else if($.screen==="detail")root.appendChild(renderDetail());
  else if($.screen==="cats")root.appendChild(renderCats());
  if($.screen==="list"){
    root.appendChild(el("div",{style:{position:"fixed",bottom:"0",left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:"430px",padding:"12px 18px 28px",background:`linear-gradient(transparent,${C.bg} 40%)`,pointerEvents:"none"}},
      el("button",{onclick:()=>set({screen:"add",step:1,method:"",addrResults:[],form:{name:"",note:"",cat:"diger",lat:"",lng:"",photo:"",link:"",addr:"",manLat:"",manLng:""}}),style:{width:"100%",background:"linear-gradient(135deg,#4f46e5,#7c3aed)",border:"none",borderRadius:"16px",color:"#fff",padding:"15px",fontSize:"15px",fontWeight:"800",cursor:"pointer",boxShadow:"0 6px 28px #7c6df055",pointerEvents:"all"}},"＋  Yeni Konum Ekle")
    ));
  }
}

if("serviceWorker" in navigator){navigator.serviceWorker.register("/KonumDefteri/sw.js").catch(()=>{});navigator.serviceWorker.addEventListener("controllerchange",()=>window.location.reload());}
let _dp;
window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();_dp=e;document.getElementById("install-banner").classList.add("show");});
document.getElementById("ib").onclick=async()=>{if(_dp){_dp.prompt();await _dp.userChoice;_dp=null;document.getElementById("install-banner").classList.remove("show");}};
document.getElementById("ic").onclick=()=>document.getElementById("install-banner").classList.remove("show");
render();
</script>
</body>
